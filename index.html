<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
  <title>DeepSeek AI 全能助手</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans', sans-serif;
    }
    body {
      background: #0a0a0a;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    #app {
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      position: relative;
      max-width: 600px;
      margin: 0 auto;
      box-shadow: 0 0 30px rgba(0,0,0,0.7);
      overflow: hidden;
    }
    /* 侧边栏 */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 80%;
      max-width: 320px;
      height: 100%;
      background: #121212;
      z-index: 100;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      display: flex;
      flex-direction: column;
      box-shadow: 2px 0 15px rgba(0,0,0,0.5);
    }
    .sidebar.open {
      transform: translateX(0);
    }
    .sidebar-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 99;
      display: none;
    }
    .sidebar.open + .sidebar-backdrop {
      display: block;
    }
    .sidebar-header {
      padding: 20px 16px;
      border-bottom: 1px solid #2a2a2a;
      color: #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sidebar-header h3 {
      font-size: 1.2rem;
      font-weight: 500;
    }
    .close-sidebar-btn {
      background: none;
      border: none;
      color: #aaa;
      font-size: 1.5rem;
      cursor: pointer;
      padding: 5px;
    }
    .search-session {
      margin: 10px;
      padding: 10px 12px;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 0.9rem;
      outline: none;
    }
    .session-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .session-item {
      padding: 12px;
      margin-bottom: 4px;
      border-radius: 8px;
      background: #1a1a1a;
      color: #ddd;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.15s;
      border: 1px solid transparent;
    }
    .session-item.active {
      border-color: #4f8cff;
      background: #1e2a3a;
    }
    .session-info {
      flex: 1;
      overflow: hidden;
    }
    .session-title {
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session-meta {
      font-size: 0.7rem;
      color: #888;
      margin-top: 4px;
    }
    .session-actions {
      display: flex;
      gap: 4px;
    }
    .session-actions button {
      background: none;
      border: none;
      color: #aaa;
      font-size: 0.9rem;
      padding: 4px;
      cursor: pointer;
    }
    .new-chat-btn {
      margin: 10px;
      padding: 12px;
      background: #2a2a2a;
      color: #fff;
      border: 1px solid #444;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
    }
    /* 主界面 */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      background: #0a0a0a;
      position: relative;
    }
    .chat-header {
      padding: 12px 16px;
      background: #111;
      display: flex;
      align-items: center;
      border-bottom: 1px solid #222;
      color: #eee;
    }
    .menu-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.5rem;
      margin-right: 12px;
      cursor: pointer;
    }
    .chat-title {
      flex: 1;
      font-weight: 500;
      font-size: 1rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .settings-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.3rem;
      cursor: pointer;
    }
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background-size: cover;
      background-position: center;
    }
    .message-row {
      display: flex;
      flex-direction: column;
      animation: slideIn 0.2s ease;
    }
    .message-row.user {
      align-items: flex-end;
    }
    .message-row.assistant {
      align-items: flex-start;
    }
    .message-bubble-wrapper {
      max-width: 85%;
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }
    .avatar {
      font-size: 1.5rem;
      width: 32px;
      text-align: center;
    }
    .bubble {
      background: #1e1e1e;
      color: #f0f0f0;
      padding: 10px 14px;
      border-radius: 16px;
      word-break: break-word;
      white-space: pre-wrap;
      position: relative;
    }
    .user .bubble {
      background: #1f3a5f;
    }
    .regenerated-block {
      border-left: 3px solid #4f8cff;
      padding-left: 8px;
      margin-top: 6px;
      background: #1a1e26;
      border-radius: 6px;
    }
    .version-controls {
      display: flex;
      gap: 8px;
      margin-top: 6px;
      font-size: 0.8rem;
      color: #aaa;
    }
    .version-btn {
      background: #2a2a2a;
      border: none;
      color: #ddd;
      padding: 2px 8px;
      border-radius: 4px;
      cursor: pointer;
    }
    .version-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }
    .edit-indicator {
      font-size: 0.7rem;
      color: #8ab4f8;
      margin-left: 4px;
    }
    .file-preview {
      background: #1e1e1e;
      padding: 8px 12px;
      margin: 0 12px 4px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #ccc;
      font-size: 0.8rem;
      border: 1px solid #333;
    }
    .remove-file-btn {
      background: none;
      border: none;
      color: #ff6b6b;
      cursor: pointer;
      font-size: 1rem;
    }
    .input-area {
      padding: 10px 12px;
      background: #111;
      border-top: 1px solid #222;
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    textarea {
      flex: 1;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 10px 14px;
      color: #fff;
      resize: none;
      max-height: 150px;
      font-size: 0.95rem;
      outline: none;
    }
    .send-btn {
      background: #2a4a7f;
      border: none;
      color: white;
      padding: 10px 14px;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
    }
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 0.9rem;
      z-index: 200;
      opacity: 0.9;
    }
    .settings-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #121212;
      z-index: 110;
      padding: 20px;
      border-radius: 20px 20px 0 0;
      color: #eee;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
      display: none;
    }
    .settings-panel.active {
      display: block;
    }
    .setting-row {
      margin-bottom: 16px;
    }
    .setting-row label {
      display: block;
      font-size: 0.8rem;
      color: #aaa;
      margin-bottom: 4px;
    }
    input, select {
      width: 100%;
      padding: 10px;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div id="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h3>会话列表</h3>
      <button class="close-sidebar-btn" id="closeSidebarBtn">✕</button>
    </div>
    <input type="text" class="search-session" id="searchSessionInput" placeholder="搜索会话...">
    <div class="session-list" id="sessionList"></div>
    <button class="new-chat-btn" id="newChatBtn">+ 新建会话</button>
  </div>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <div class="main">
    <div class="chat-header">
      <button class="menu-btn" id="menuBtn">☰</button>
      <span class="chat-title" id="chatTitle">DeepSeek 助手</span>
      <button class="settings-btn" id="settingsBtn">⚙️</button>
    </div>
    <div class="messages-container" id="messagesContainer"></div>
    <div id="filePreviewArea" style="padding:0 12px;"></div>
    <div class="input-area">
      <textarea id="userInput" rows="1" placeholder="输入消息... (Enter发送)"></textarea>
      <input type="file" id="fileInput" accept=".txt,.pdf,.md,.json,.csv,.html,.css,.js,.py,.log,.xml,.yaml,.yml" style="display:none">
      <button class="send-btn" id="attachBtn">📎</button>
      <button class="send-btn" id="sendBtn">发送</button>
    </div>
  </div>
  <div class="settings-panel" id="settingsPanel">
    <h4 style="margin-bottom:16px;">设置</h4>
    <div class="setting-row"><label>API Key</label><input type="password" id="apiKeyInput" placeholder="sk-..."></div>
    <div class="setting-row"><label>模型</label><select id="modelSelect"><option value="deepseek-chat">deepseek-chat</option><option value="deepseek-reasoner">deepseek-reasoner (R1)</option></select></div>
    <div class="setting-row"><label>Temperature</label><input type="range" id="tempRange" min="0" max="2" step="0.1" value="0.7"><span id="tempValue">0.7</span></div>
    <div class="setting-row"><label>深度思考</label><input type="checkbox" id="deepThinkCheck"></div>
    <div class="setting-row"><label>用户头像(emoji)</label><input id="userAvatarInput" value="😀"></div>
    <div class="setting-row"><label>AI头像(emoji)</label><input id="aiAvatarInput" value="🤖"></div>
    <div class="setting-row"><label>背景类型</label><select id="bgTypeSelect"><option value="color">纯色</option><option value="gradient">渐变</option><option value="image">图片URL</option></select></div>
    <div class="setting-row"><input id="bgValueInput" placeholder="#0a0a0a 或 url(...)"></div>
    <div style="display:flex; gap:8px; margin-top:12px;">
      <button id="exportBtn">导出会话</button>
      <button id="importBtn">导入会话</button>
    </div>
    <button id="closeSettingsBtn" style="margin-top:16px; width:100%;">关闭设置</button>
  </div>
</div>
<script>
  (function() {
    const DB_NAME = 'DeepSeekChatDB_V2';
    const DB_VERSION = 1;
    let db;
    const appState = {
      apiKey: '',
      model: 'deepseek-chat',
      temperature: 0.7,
      deepThink: false,
      bgType: 'color',
      bgValue: '#0a0a0a',
      userAvatar: '😀',
      assistantAvatar: '🤖',
      activeSessionId: null,
      sessions: {},
      sessionOrder: []
    };
    let currentFile = null;

    // IndexedDB
    function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains('state')) {
            db.createObjectStore('state', { keyPath: 'key' });
          }
        };
        request.onsuccess = (e) => { db = e.target.result; resolve(db); };
        request.onerror = reject;
      });
    }
    async function saveState() {
      if (!db) await openDB();
      const tx = db.transaction('state', 'readwrite');
      const store = tx.objectStore('state');
      store.put({ key: 'appState', value: JSON.parse(JSON.stringify(appState)) });
    }
    async function loadState() {
      if (!db) await openDB();
      return new Promise((resolve) => {
        const tx = db.transaction('state', 'readonly');
        const store = tx.objectStore('state');
        const req = store.get('appState');
        req.onsuccess = () => {
          if (req.result) {
            Object.assign(appState, req.result.value);
          }
          resolve();
        };
        req.onerror = () => resolve();
      });
    }

    // 工具函数
    function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2); }
    function formatTime(iso) { const d=new Date(iso); return d.toLocaleString(); }
    function showToast(msg) {
      const t = document.createElement('div'); t.className='toast'; t.textContent=msg;
      document.body.appendChild(t);
      setTimeout(()=>t.remove(), 2000);
    }

    // 会话管理
    function createSession(title = '新对话') {
      const id = generateId();
      const session = {
        id, title, messages: [], createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
      };
      appState.sessions[id] = session;
      appState.sessionOrder.unshift(id);
      appState.activeSessionId = id;
      saveState();
      return session;
    }
    function getActiveSession() {
      return appState.sessions[appState.activeSessionId] || null;
    }

    // UI渲染
    const elements = {
      sidebar: document.getElementById('sidebar'),
      sessionList: document.getElementById('sessionList'),
      messagesContainer: document.getElementById('messagesContainer'),
      chatTitle: document.getElementById('chatTitle'),
      userInput: document.getElementById('userInput'),
      filePreviewArea: document.getElementById('filePreviewArea'),
    };

    function renderSessionList(filter = '') {
      const list = elements.sessionList;
      list.innerHTML = '';
      const order = appState.sessionOrder.filter(id => appState.sessions[id]);
      order.forEach(id => {
        const s = appState.sessions[id];
        if (filter && !s.title.toLowerCase().includes(filter.toLowerCase())) return;
        const div = document.createElement('div');
        div.className = `session-item ${id === appState.activeSessionId ? 'active' : ''}`;
        div.innerHTML = `<div class="session-info"><div class="session-title">${s.title||'未命名'}</div><div class="session-meta">${s.messages.length}条消息 · ${formatTime(s.updatedAt)}</div></div>`;
        div.onclick = (e) => {
          if (e.target.tagName === 'BUTTON') return;
          appState.activeSessionId = id;
          saveState(); renderChat(); closeSidebar();
        };
        div.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          const newTitle = prompt('重命名会话', s.title);
          if (newTitle) { s.title = newTitle; saveState(); renderSessionList(); renderChat(); }
        });
        const delBtn = document.createElement('button');
        delBtn.textContent='🗑'; delBtn.onclick=(e)=>{e.stopPropagation(); if(confirm('删除会话？')){ deleteSession(id); }};
        div.appendChild(delBtn);
        list.appendChild(div);
      });
    }
    function deleteSession(id) {
      delete appState.sessions[id];
      appState.sessionOrder = appState.sessionOrder.filter(i => i !== id);
      if (appState.activeSessionId === id) {
        appState.activeSessionId = appState.sessionOrder[0] || null;
        if (!appState.activeSessionId) createSession();
      }
      saveState(); renderSessionList(); renderChat();
    }

    function renderChat() {
      const session = getActiveSession();
      if (!session) { elements.chatTitle.textContent = 'DeepSeek'; elements.messagesContainer.innerHTML = ''; return; }
      elements.chatTitle.textContent = session.title;
      const container = elements.messagesContainer;
      container.innerHTML = '';
      session.messages.forEach((msg, idx) => {
        renderMessage(msg, idx, container);
      });
      applyBackground();
      container.scrollTop = container.scrollHeight;
    }

    function renderMessage(msg, idx, container) {
      const row = document.createElement('div');
      row.className = `message-row ${msg.role}`;
      const avatar = msg.role === 'user' ? appState.userAvatar : appState.assistantAvatar;
      let contentHtml = msg.content;
      if (msg.isError) contentHtml = `<span style="color:#ff6b6b;">❌ ${msg.content}</span>`;

      let bubbleHtml = `<div class="bubble">${contentHtml}</div>`;
      if (msg._hasEdits && msg.editHistory) {
        const currentVer = msg._currentVersionIndex ?? msg.editHistory.length;
        bubbleHtml += `<div class="version-controls"><button class="version-btn" ${currentVer<=0?'disabled':''} data-action="prevVer" data-idx="${idx}">◀</button><span>${currentVer+1}/${msg.editHistory.length+1}</span><button class="version-btn" ${currentVer>=msg.editHistory.length?'disabled':''} data-action="nextVer" data-idx="${idx}">▶</button></div>`;
      }
      if (msg._isRegenerated) {
        bubbleHtml = `<div class="regenerated-block">${bubbleHtml}<div class="version-controls"><button class="version-btn regenerated-prev" data-idx="${idx}">◀</button><span>版本</span><button class="version-btn regenerated-next" data-idx="${idx}">▶</button></div></div>`;
      }
      row.innerHTML = `<div class="message-bubble-wrapper">${msg.role==='user'?''+bubbleHtml+avatar:avatar+bubbleHtml}</div>`;
      container.appendChild(row);
    }

    function applyBackground() {
      const c = elements.messagesContainer;
      if (appState.bgType === 'color') c.style.background = appState.bgValue || '#0a0a0a';
      else if (appState.bgType === 'gradient') c.style.background = appState.bgValue;
      else if (appState.bgType === 'image') c.style.backgroundImage = `url(${appState.bgValue})`;
    }

    function closeSidebar() {
      elements.sidebar.classList.remove('open');
    }

    // API调用
    async function callDeepSeek(messages) {
      if (!appState.apiKey) throw new Error('请先设置API Key');
      const model = appState.deepThink ? 'deepseek-reasoner' : appState.model;
      const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${appState.apiKey}` },
        body: JSON.stringify({
          model, messages, temperature: appState.temperature, max_tokens: appState.deepThink?4000:2000, stream: false
        })
      });
      if (!res.ok) {
        if (res.status===401) throw new Error('API Key 无效');
        if (res.status===402) throw new Error('余额不足，请充值');
        if (res.status===429) throw new Error('请求太频繁');
        throw new Error(`API错误 ${res.status}`);
      }
      const data = await res.json();
      return data.choices[0].message.content;
    }

    async function sendMessage() {
      const text = elements.userInput.value.trim();
      if (!text && !currentFile) return;
      const session = getActiveSession();
      if (!session) { createSession(); return; }
      let fullContent = text;
      if (currentFile) {
        fullContent = `[文件: ${currentFile.name}]\n${currentFile.content}\n\n${text}`;
      }
      const userMsg = { role: 'user', content: fullContent, isError: false, _hasEdits: false, editHistory: [], _currentVersionIndex:0, _originalContent: fullContent };
      session.messages.push(userMsg);
      session.updatedAt = new Date().toISOString();
      saveState(); renderChat();
      elements.userInput.value = ''; clearFile();
      try {
        const contextMessages = session.messages.filter(m=>!m.isError).map(m=>({role:m.role, content:m.content}));
        const reply = await callDeepSeek(contextMessages);
        const assistantMsg = { role: 'assistant', content: reply, isError: false };
        session.messages.push(assistantMsg);
        session.updatedAt = new Date().toISOString();
        saveState(); renderChat();
      } catch (e) {
        const errMsg = { role: 'assistant', content: e.message, isError: true };
        session.messages.push(errMsg);
        saveState(); renderChat();
        showToast(e.message);
      }
    }

    function clearFile() {
      currentFile = null;
      elements.filePreviewArea.innerHTML = '';
    }

    // 事件绑定
    document.getElementById('menuBtn').onclick = () => elements.sidebar.classList.add('open');
    document.getElementById('closeSidebarBtn').onclick = closeSidebar;
    document.getElementById('sidebarBackdrop').onclick = closeSidebar;
    document.getElementById('newChatBtn').onclick = ()=>{ createSession(); renderSessionList(); renderChat(); closeSidebar(); };
    document.getElementById('searchSessionInput').oninput = (e) => renderSessionList(e.target.value);
    document.getElementById('sendBtn').onclick = sendMessage;
    document.getElementById('attachBtn').onclick = ()=> document.getElementById('fileInput').click();
    document.getElementById('fileInput').onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      if (file.size > 50*1024*1024) { showToast('文件不能超过50MB'); return; }
      const text = await file.text();
      currentFile = { name: file.name, content: text };
      elements.filePreviewArea.innerHTML = `<div class="file-preview">📄 ${file.name} (${(file.size/1024).toFixed(1)}KB) <button class="remove-file-btn" onclick="clearFile()">✕</button></div>`;
    };
    window.clearFile = clearFile;
    document.getElementById('userInput').onkeydown = (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    };
    document.getElementById('settingsBtn').onclick = ()=> document.getElementById('settingsPanel').classList.toggle('active');
    document.getElementById('closeSettingsBtn').onclick = ()=> document.getElementById('settingsPanel').classList.remove('active');
    document.getElementById('apiKeyInput').onchange = (e) => { appState.apiKey=e.target.value; saveState(); };
    document.getElementById('modelSelect').onchange = (e) => { appState.model=e.target.value; saveState(); };
    document.getElementById('tempRange').oninput = (e) => { appState.temperature=+e.target.value; document.getElementById('tempValue').textContent=e.target.value; saveState(); };
    document.getElementById('deepThinkCheck').onchange = (e) => { appState.deepThink=e.target.checked; saveState(); };
    document.getElementById('userAvatarInput').onchange = (e) => { appState.userAvatar=e.target.value; saveState(); renderChat(); };
    document.getElementById('aiAvatarInput').onchange = (e) => { appState.assistantAvatar=e.target.value; saveState(); renderChat(); };
    document.getElementById('bgTypeSelect').onchange = (e) => { appState.bgType=e.target.value; saveState(); applyBackground(); };
    document.getElementById('bgValueInput').oninput = (e) => { appState.bgValue=e.target.value; saveState(); applyBackground(); };
    document.getElementById('exportBtn').onclick = () => {
      const blob = new Blob([JSON.stringify(appState, null, 2)], {type:'application/json'});
      const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='deepseek-backup.json'; a.click();
    };
    document.getElementById('importBtn').onclick = () => {
      const input = document.createElement('input'); input.type='file'; input.accept='.json';
      input.onchange = async (e) => {
        const file = e.target.files[0];
        const text = await file.text();
        try {
          const data = JSON.parse(text);
          if (data.sessions && data.sessionOrder) {
            Object.assign(appState, data);
            saveState(); renderSessionList(); renderChat();
            showToast('导入成功');
          }
        } catch { showToast('文件格式错误'); }
      };
      input.click();
    };

    // 初始化
    (async function init() {
      await openDB();
      await loadState();
      if (!appState.sessionOrder.length || Object.keys(appState.sessions).length===0) {
        createSession('欢迎使用');
      }
      if (!appState.activeSessionId || !appState.sessions[appState.activeSessionId]) {
        appState.activeSessionId = appState.sessionOrder[0];
      }
      renderSessionList();
      renderChat();
      document.getElementById('apiKeyInput').value = appState.apiKey || '';
      document.getElementById('modelSelect').value = appState.model;
      document.getElementById('tempRange').value = appState.temperature;
      document.getElementById('tempValue').textContent = appState.temperature;
      document.getElementById('deepThinkCheck').checked = appState.deepThink;
      document.getElementById('userAvatarInput').value = appState.userAvatar;
      document.getElementById('aiAvatarInput').value = appState.assistantAvatar;
      document.getElementById('bgTypeSelect').value = appState.bgType;
      document.getElementById('bgValueInput').value = appState.bgValue;
      applyBackground();
    })();
  })();
</script>
</body>
</html>
