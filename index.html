<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
  <title>DeepSeek AI 全能助手</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans', sans-serif;
    }
    body {
      background: #0a0a0a;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    #app {
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      position: relative;
      max-width: 600px;
      margin: 0 auto;
      box-shadow: 0 0 30px rgba(0,0,0,0.7);
      overflow: hidden;
    }
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 80%;
      max-width: 320px;
      height: 100%;
      background: #121212;
      z-index: 100;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      display: flex;
      flex-direction: column;
      box-shadow: 2px 0 15px rgba(0,0,0,0.5);
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 99;
      display: none;
    }
    .sidebar.open + .sidebar-backdrop { display: block; }
    .sidebar-header {
      padding: 20px 16px;
      border-bottom: 1px solid #2a2a2a;
      color: #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sidebar-header h3 { font-size: 1.2rem; font-weight: 500; }
    .close-sidebar-btn {
      background: none; border: none; color: #aaa;
      font-size: 1.5rem; cursor: pointer; padding: 5px;
    }
    .search-session {
      margin: 10px; padding: 10px 12px; background: #1e1e1e;
      border: 1px solid #333; border-radius: 8px; color: #fff;
      font-size: 0.9rem; outline: none;
    }
    .session-list { flex: 1; overflow-y: auto; padding: 8px; }
    .session-item {
      padding: 12px; margin-bottom: 4px; border-radius: 8px;
      background: #1a1a1a; color: #ddd; cursor: pointer;
      display: flex; justify-content: space-between; align-items: center;
      transition: background 0.15s; border: 1px solid transparent;
    }
    .session-item.active { border-color: #4f8cff; background: #1e2a3a; }
    .session-info { flex: 1; overflow: hidden; }
    .session-title {
      font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .session-meta { font-size: 0.7rem; color: #888; margin-top: 4px; }
    .new-chat-btn {
      margin: 10px; padding: 12px; background: #2a2a2a; color: #fff;
      border: 1px solid #444; border-radius: 8px; font-weight: 500; cursor: pointer;
    }
    .main {
      flex: 1; display: flex; flex-direction: column; height: 100%;
      background: #0a0a0a; position: relative;
    }
    .chat-header {
      padding: 12px 16px; background: #111; display: flex;
      align-items: center; border-bottom: 1px solid #222; color: #eee;
    }
    .menu-btn {
      background: none; border: none; color: #ccc;
      font-size: 1.5rem; margin-right: 12px; cursor: pointer;
    }
    .chat-title { flex: 1; font-weight: 500; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .settings-btn { background: none; border: none; color: #ccc; font-size: 1.3rem; cursor: pointer; }
    .messages-container {
      flex: 1; overflow-y: auto; padding: 16px 12px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .message-row {
      display: flex; flex-direction: column;
      animation: slideIn 0.2s ease; position: relative;
    }
    .message-row.user { align-items: flex-end; }
    .message-row.assistant { align-items: flex-start; }
    .message-wrapper {
      max-width: 90%; display: flex; align-items: flex-start; gap: 6px;
    }
    .avatar { font-size: 1.5rem; width: 32px; text-align: center; flex-shrink: 0; }
    .bubble {
      background: #1e1e1e; color: #f0f0f0; padding: 10px 14px;
      border-radius: 16px; word-break: break-word; white-space: pre-wrap;
      position: relative; cursor: pointer; transition: opacity 0.15s;
    }
    .bubble:active { opacity: 0.85; }
    .user .bubble { background: #1f3a5f; }
    
    .message-actions {
      display: none; gap: 4px; margin-top: 4px; font-size: 0.7rem;
      flex-wrap: wrap; align-items: center; animation: fadeIn 0.15s ease;
    }
    .message-actions.visible { display: flex; }
    .action-btn {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      color: #ccc; padding: 2px 8px; border-radius: 10px; cursor: pointer;
      font-size: 0.7rem; white-space: nowrap; transition: background 0.15s;
    }
    .action-btn:active { background: rgba(255,255,255,0.3); }
    .action-btn:disabled { opacity: 0.4; cursor: default; }
    
    .regenerated-block {
      border-left: 3px solid #4f8cff; padding-left: 8px;
      background: #1a1e26; border-radius: 6px;
    }
    .version-controls { display: inline-flex; align-items: center; gap: 4px; }
    .version-btn {
      background: #2a2a2a; border: none; color: #ddd; padding: 2px 6px;
      border-radius: 4px; cursor: pointer; font-size: 0.7rem;
      min-width: 24px; text-align: center; transition: background 0.15s;
    }
    .version-btn:active { background: #3a3a3a; }
    .version-btn:disabled { opacity: 0.35; cursor: default; background: #1a1a1a; }
    .version-info { color: #8ab4f8; font-size: 0.7rem; min-width: 40px; text-align: center; }
    .editing-indicator { color: #ffa500; font-size: 0.65rem; margin-left: 4px; }
    
    .file-preview {
      background: #1e1e1e; padding: 8px 12px; margin: 0 12px 4px;
      border-radius: 8px; display: flex; align-items: center; gap: 8px;
      color: #ccc; font-size: 0.8rem; border: 1px solid #333;
    }
    .remove-file-btn { background: none; border: none; color: #ff6b6b; cursor: pointer; font-size: 1rem; }
    
    .input-area {
      padding: 10px 12px; background: #111; border-top: 1px solid #222;
      display: flex; align-items: flex-end; gap: 8px;
    }
    textarea {
      flex: 1; background: #1e1e1e; border: 1px solid #333;
      border-radius: 12px; padding: 10px 14px; color: #fff;
      resize: none; max-height: 150px; font-size: 0.95rem;
      outline: none; line-height: 1.4;
      scrollbar-width: none; -ms-overflow-style: none; overflow-y: auto;
    }
    textarea::-webkit-scrollbar { display: none; width: 0; height: 0; }
    
    .send-btn {
      background: #2a4a7f; border: none; color: white;
      padding: 10px 14px; border-radius: 12px;
      font-weight: bold; cursor: pointer; font-size: 0.9rem;
    }
    .attach-btn {
      background: #2a2a2a; border: 1px solid #444; color: white;
      padding: 10px; border-radius: 12px; cursor: pointer; font-size: 1rem;
    }
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: #333; color: white; padding: 8px 20px; border-radius: 20px;
      font-size: 0.9rem; z-index: 200; opacity: 0.9; pointer-events: none;
    }
    .settings-panel {
      position: fixed; bottom: 0; left: 0; width: 100%; background: #121212;
      z-index: 110; padding: 20px; border-radius: 20px 20px 0 0;
      color: #eee; max-height: 80vh; overflow-y: auto;
      box-shadow: 0 -5px 20px rgba(0,0,0,0.5); display: none;
    }
    .settings-panel.active { display: block; }
    .setting-row { margin-bottom: 16px; }
    .setting-row label { display: block; font-size: 0.8rem; color: #aaa; margin-bottom: 4px; }
    input, select {
      width: 100%; padding: 10px; background: #1e1e1e;
      border: 1px solid #333; border-radius: 8px; color: #fff;
    }
    input[type="checkbox"] { width: auto; }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
<div id="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h3>会话列表</h3>
      <button class="close-sidebar-btn" id="closeSidebarBtn">✕</button>
    </div>
    <input type="text" class="search-session" id="searchSessionInput" placeholder="搜索会话...">
    <div class="session-list" id="sessionList"></div>
    <button class="new-chat-btn" id="newChatBtn">+ 新建会话</button>
  </div>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  
  <div class="main">
    <div class="chat-header">
      <button class="menu-btn" id="menuBtn">☰</button>
      <span class="chat-title" id="chatTitle">DeepSeek 助手</span>
      <button class="settings-btn" id="settingsBtn">⚙️</button>
    </div>
    <div class="messages-container" id="messagesContainer"></div>
    <div id="filePreviewArea" style="padding:0 12px;"></div>
    <div class="input-area">
      <textarea id="userInput" rows="1" placeholder="输入消息... (Enter发送)"></textarea>
      <input type="file" id="fileInput" accept=".txt,.pdf,.md,.json,.csv,.html,.css,.js,.py,.log,.xml,.yaml,.yml" style="display:none">
      <button class="attach-btn" id="attachBtn">📎</button>
      <button class="send-btn" id="sendBtn">发送</button>
    </div>
  </div>
  
  <div class="settings-panel" id="settingsPanel">
    <h4 style="margin-bottom:16px;">设置</h4>
    <div class="setting-row"><label>API Key</label><input type="password" id="apiKeyInput" placeholder="sk-..."></div>
    <div class="setting-row"><label>模型</label><select id="modelSelect"><option value="deepseek-chat">deepseek-chat</option><option value="deepseek-reasoner">deepseek-reasoner (R1)</option></select></div>
    <div class="setting-row"><label>Temperature (<span id="tempValue">0.7</span>)</label><input type="range" id="tempRange" min="0" max="2" step="0.1" value="0.7"></div>
    <div class="setting-row"><label>深度思考模式 <input type="checkbox" id="deepThinkCheck"></label></div>
    <div class="setting-row"><label>用户头像(emoji)</label><input id="userAvatarInput" value="😀"></div>
    <div class="setting-row"><label>AI头像(emoji)</label><input id="aiAvatarInput" value="🤖"></div>
    <div class="setting-row"><label>背景类型</label><select id="bgTypeSelect"><option value="color">纯色</option><option value="gradient">渐变</option><option value="image">图片URL</option></select></div>
    <div class="setting-row"><input id="bgValueInput" placeholder="#0a0a0a 或渐变 或图片URL"></div>
    <div style="display:flex; gap:8px; margin-top:12px; flex-wrap:wrap;">
      <button id="exportBtn" class="action-btn" style="padding:8px 16px; display:inline-block;">📤 导出</button>
      <button id="importBtn" class="action-btn" style="padding:8px 16px; display:inline-block;">📥 导入</button>
    </div>
    <button id="closeSettingsBtn" style="margin-top:16px; width:100%; padding:10px; background:#333; border:none; color:white; border-radius:8px;">关闭</button>
  </div>
</div>

<script>
  (function() {
    // ========== 数据库 - 修复IndexedDB连接 ==========
    const DB_NAME = 'DeepSeekChatDB_V2';
    let db = null;
    
    const appState = {
      apiKey: '',
      model: 'deepseek-chat',
      temperature: 0.7,
      deepThink: false,
      bgType: 'color',
      bgValue: '#0a0a0a',
      userAvatar: '😀',
      assistantAvatar: '🤖',
      activeSessionId: null,
      sessions: {},
      sessionOrder: []
    };
    
    let currentFile = null;
    let isStreaming = false;
    let activeMenuMessageId = null;

    // 改进的数据库打开方法
    function openDB() {
      return new Promise((resolve, reject) => {
        if (db) {
          resolve(db);
          return;
        }
        
        const request = indexedDB.open(DB_NAME, 1);
        
        request.onupgradeneeded = (e) => {
          const database = e.target.result;
          if (!database.objectStoreNames.contains('state')) {
            database.createObjectStore('state', { keyPath: 'key' });
          }
        };
        
        request.onsuccess = (e) => {
          db = e.target.result;
          resolve(db);
        };
        
        request.onerror = (e) => {
          console.error('IndexedDB 打开失败:', e.target.error);
          reject(e.target.error);
        };
        
        request.onblocked = () => {
          console.warn('IndexedDB 被阻塞，尝试关闭其他连接');
        };
      });
    }
    
    async function saveState() {
      try {
        if (!db) await openDB();
        
        const stateData = JSON.parse(JSON.stringify(appState));
        
        return new Promise((resolve, reject) => {
          const tx = db.transaction('state', 'readwrite');
          const store = tx.objectStore('state');
          
          const request = store.put({ key: 'appState', value: stateData });
          
          request.onsuccess = () => {
            resolve();
          };
          
          request.onerror = (e) => {
            console.error('保存状态失败:', e.target.error);
            reject(e.target.error);
          };
          
          tx.oncomplete = () => {
            // 事务完成
          };
          
          tx.onerror = (e) => {
            console.error('事务失败:', e.target.error);
          };
        });
      } catch (error) {
        console.error('saveState 错误:', error);
      }
    }
    
    async function loadState() {
      try {
        if (!db) await openDB();
        
        return new Promise((resolve) => {
          const tx = db.transaction('state', 'readonly');
          const store = tx.objectStore('state');
          const request = store.get('appState');
          
          request.onsuccess = () => {
            if (request.result && request.result.value) {
              const loadedState = request.result.value;
              
              // 完整恢复所有状态
              appState.apiKey = loadedState.apiKey || '';
              appState.model = loadedState.model || 'deepseek-chat';
              appState.temperature = loadedState.temperature ?? 0.7;
              appState.deepThink = loadedState.deepThink || false;
              appState.bgType = loadedState.bgType || 'color';
              appState.bgValue = loadedState.bgValue || '#0a0a0a';
              appState.userAvatar = loadedState.userAvatar || '😀';
              appState.assistantAvatar = loadedState.assistantAvatar || '🤖';
              appState.activeSessionId = loadedState.activeSessionId || null;
              appState.sessions = loadedState.sessions || {};
              appState.sessionOrder = loadedState.sessionOrder || [];
              
              // 恢复会话消息中的特殊字段
              Object.values(appState.sessions).forEach(session => {
                if (session.messages) {
                  session.messages.forEach(msg => {
                    if (msg.regeneratedVersions) {
                      msg._isRegenerated = true;
                    }
                  });
                }
              });
            }
            resolve();
          };
          
          request.onerror = () => {
            console.warn('加载状态失败，使用默认状态');
            resolve();
          };
        });
      } catch (error) {
        console.error('loadState 错误:', error);
      }
    }

    // ========== 工具函数 ==========
    function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 9); }
    
    function formatTime(iso) {
      if (!iso) return '';
      try {
        const d = new Date(iso);
        if (isNaN(d.getTime())) return '';
        return d.toLocaleDateString('zh-CN') + ' ' + d.toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
      } catch {
        return '';
      }
    }
    
    function showToast(msg) {
      const existingToast = document.querySelector('.toast');
      if (existingToast) existingToast.remove();
      
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => {
        if (t.parentNode) t.remove();
      }, 2500);
    }
    
    function getActiveSession() {
      if (!appState.activeSessionId || !appState.sessions[appState.activeSessionId]) {
        if (appState.sessionOrder.length > 0) {
          appState.activeSessionId = appState.sessionOrder[0];
        } else {
          return null;
        }
      }
      return appState.sessions[appState.activeSessionId] || null;
    }
    
    function msgId(sessionId, msgIndex) { return `${sessionId}_${msgIndex}`; }

    // ========== 会话管理 ==========
    function createSession(title = '新对话') {
      const id = generateId();
      const session = {
        id,
        title,
        messages: [],
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };
      appState.sessions[id] = session;
      appState.sessionOrder.unshift(id);
      appState.activeSessionId = id;
      saveState();
      return session;
    }
    
    function deleteSession(id) {
      if (!appState.sessions[id]) return;
      
      delete appState.sessions[id];
      appState.sessionOrder = appState.sessionOrder.filter(i => i !== id);
      
      if (appState.activeSessionId === id) {
        appState.activeSessionId = appState.sessionOrder[0] || null;
      }
      
      if (Object.keys(appState.sessions).length === 0) {
        createSession('新对话');
      }
      
      saveState();
      renderSessionList();
      renderChat();
    }
    
    function renameSession(id, title) {
      if (appState.sessions[id] && title.trim()) {
        appState.sessions[id].title = title.trim();
        appState.sessions[id].updatedAt = new Date().toISOString();
        saveState();
        renderSessionList();
        renderChat();
      }
    }

    // ========== 消息核心操作 ==========
    function getUserMessageDisplayContent(msg) {
      if (!msg._hasEdits || !msg.editHistory || msg.editHistory.length === 0) {
        return msg.content;
      }
      const idx = msg._currentVersionIndex ?? msg.editHistory.length;
      return idx >= msg.editHistory.length ? msg.content : msg.editHistory[idx].oldContent;
    }

    function editUserMessage(session, messageIndex, newContent) {
      const msg = session.messages[messageIndex];
      if (!msg || msg.role !== 'user') return false;
      
      if (!msg._hasEdits) {
        msg._hasEdits = true;
        msg.editHistory = [];
        msg._originalContent = msg.content;
      }
      
      msg.editHistory.push({
        oldContent: msg.content,
        editedAt: new Date().toISOString()
      });
      
      msg.content = newContent.trim();
      msg._currentVersionIndex = msg.editHistory.length;
      
      // 删除该消息之后的所有消息
      session.messages = session.messages.slice(0, messageIndex + 1);
      session.updatedAt = new Date().toISOString();
      saveState();
      return true;
    }

    function switchUserMessageVersion(session, messageIndex, direction) {
      const msg = session.messages[messageIndex];
      if (!msg || !msg._hasEdits || !msg.editHistory) return false;
      
      const maxVersion = msg.editHistory.length;
      let currentIdx = msg._currentVersionIndex ?? maxVersion;
      
      if (direction === 'prev' && currentIdx > 0) {
        currentIdx--;
      } else if (direction === 'next' && currentIdx < maxVersion) {
        currentIdx++;
      } else {
        return false;
      }
      
      msg._currentVersionIndex = currentIdx;
      saveState();
      return true;
    }

    async function regenerateAnswer(session, aiMessageIndex) {
      if (isStreaming) {
        showToast('请等待当前请求完成');
        return;
      }
      
      if (aiMessageIndex < 1) return;
      const userMsg = session.messages[aiMessageIndex - 1];
      if (userMsg.role !== 'user') return;
      
      // 构建上下文消息
      const contextMessages = [];
      for (let i = 0; i < aiMessageIndex; i++) {
        const m = session.messages[i];
        if (!m.isError) {
          const content = (m.role === 'user' && m._hasEdits) ? m.content : m.content;
          contextMessages.push({ role: m.role, content: content });
        }
      }
      
      isStreaming = true;
      activeMenuMessageId = null;
      renderChat();
      
      try {
        const newContent = await callDeepSeekAPI(contextMessages);
        const aiMsg = session.messages[aiMessageIndex];
        
        // 初始化重新生成版本数组
        if (!aiMsg.regeneratedVersions) {
          aiMsg.regeneratedVersions = [{
            content: aiMsg.content,
            timestamp: aiMsg._regeneratedAt || new Date().toISOString()
          }];
          aiMsg._isRegenerated = true;
        }
        
        // 保存当前版本到历史
        aiMsg.regeneratedVersions.push({
          content: aiMsg.content,
          timestamp: new Date().toISOString()
        });
        
        // 更新为新内容
        aiMsg.content = newContent;
        aiMsg._regeneratedAt = new Date().toISOString();
        aiMsg._currentRegeneratedIndex = aiMsg.regeneratedVersions.length;
        aiMsg.isError = false;
        
        session.updatedAt = new Date().toISOString();
        await saveState();
      } catch (e) {
        showToast('重新生成失败: ' + e.message);
      } finally {
        isStreaming = false;
        renderChat();
      }
    }

    function switchRegeneratedVersion(session, aiMessageIndex, direction) {
      const msg = session.messages[aiMessageIndex];
      if (!msg || !msg.regeneratedVersions || msg.regeneratedVersions.length === 0) return false;
      
      const versions = msg.regeneratedVersions;
      let currentIdx = msg._currentRegeneratedIndex ?? versions.length;
      
      if (direction === 'prev') {
        if (currentIdx <= 0) return false;
        currentIdx--;
      } else if (direction === 'next') {
        if (currentIdx >= versions.length) return false;
        currentIdx++;
      } else {
        return false;
      }
      
      msg._currentRegeneratedIndex = currentIdx;
      
      if (currentIdx < versions.length) {
        msg.content = versions[currentIdx].content;
      }
      
      saveState();
      return true;
    }

    // ========== API调用 ==========
    async function callDeepSeekAPI(messages) {
      if (!appState.apiKey) {
        throw new Error('请先在设置中配置API Key');
      }
      
      const model = appState.deepThink ? 'deepseek-reasoner' : appState.model;
      
      const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${appState.apiKey}`
        },
        body: JSON.stringify({
          model: model,
          messages: messages,
          temperature: appState.temperature,
          max_tokens: appState.deepThink ? 4000 : 2000,
          stream: false
        })
      });
      
      if (!response.ok) {
        const errorData = await response.json().catch(() => ({}));
        if (response.status === 401) throw new Error('API Key 无效，请检查设置');
        if (response.status === 402) throw new Error('余额不足，请充值');
        if (response.status === 429) throw new Error('请求太频繁，请稍后再试');
        throw new Error(errorData.error?.message || `API错误 (${response.status})`);
      }
      
      const data = await response.json();
      return data.choices[0].message.content;
    }

    // ========== 发送消息 ==========
    async function sendMessage() {
      if (isStreaming) {
        showToast('请等待当前回复完成');
        return;
      }
      
      const userInput = document.getElementById('userInput');
      const text = userInput.value.trim();
      
      if (!text && !currentFile) return;
      
      let session = getActiveSession();
      if (!session) {
        session = createSession('新对话');
      }
      
      let fullContent = text;
      if (currentFile) {
        fullContent = `[上传文件: ${currentFile.name}]\n\n文件内容:\n${currentFile.content}\n\n${text || '请分析以上文件内容'}`;
      }
      
      // 添加用户消息
      const userMsg = {
        role: 'user',
        content: fullContent,
        isError: false,
        _hasEdits: false,
        editHistory: [],
        _originalContent: fullContent,
        _currentVersionIndex: 0
      };
      
      session.messages.push(userMsg);
      session.updatedAt = new Date().toISOString();
      
      // 自动设置会话标题
      if (session.messages.filter(m => m.role === 'user').length === 1) {
        session.title = fullContent.substring(0, 30) || '新对话';
      }
      
      await saveState();
      
      // 清空输入
      userInput.value = '';
      userInput.style.height = 'auto';
      clearFile();
      activeMenuMessageId = null;
      renderChat();
      
      // 准备API上下文
      isStreaming = true;
      const contextMessages = session.messages
        .filter(m => !m.isError)
        .map(m => ({
          role: m.role,
          content: (m.role === 'user' && m._hasEdits) ? m.content : m.content
        }));
      
      try {
        const reply = await callDeepSeekAPI(contextMessages);
        
        const assistantMsg = {
          role: 'assistant',
          content: reply,
          isError: false,
          _isRegenerated: false,
          regeneratedVersions: [],
          _currentRegeneratedIndex: 0
        };
        
        session.messages.push(assistantMsg);
        session.updatedAt = new Date().toISOString();
        await saveState();
      } catch (e) {
        const errorMsg = {
          role: 'assistant',
          content: e.message,
          isError: true
        };
        
        session.messages.push(errorMsg);
        session.updatedAt = new Date().toISOString();
        await saveState();
        showToast(e.message);
      } finally {
        isStreaming = false;
        renderChat();
      }
    }

    async function editAndResend(session, messageIndex) {
      const msg = session.messages[messageIndex];
      if (!msg || msg.role !== 'user') return;
      
      const currentDisplay = getUserMessageDisplayContent(msg);
      const newContent = prompt('编辑消息:', currentDisplay);
      
      if (newContent === null || newContent.trim() === '' || newContent.trim() === currentDisplay) {
        return;
      }
      
      if (isStreaming) {
        showToast('请等待当前请求完成');
        return;
      }
      
      editUserMessage(session, messageIndex, newContent.trim());
      activeMenuMessageId = null;
      renderChat();
      
      isStreaming = true;
      const contextMessages = session.messages
        .filter(m => !m.isError)
        .map(m => ({
          role: m.role,
          content: (m.role === 'user' && m._hasEdits) ? m.content : m.content
        }));
      
      try {
        const reply = await callDeepSeekAPI(contextMessages);
        
        const assistantMsg = {
          role: 'assistant',
          content: reply,
          isError: false,
          _isRegenerated: false,
          regeneratedVersions: [],
          _currentRegeneratedIndex: 0
        };
        
        session.messages.push(assistantMsg);
        session.updatedAt = new Date().toISOString();
        await saveState();
      } catch (e) {
        const errorMsg = {
          role: 'assistant',
          content: e.message,
          isError: true
        };
        
        session.messages.push(errorMsg);
        session.updatedAt = new Date().toISOString();
        await saveState();
        showToast(e.message);
      } finally {
        isStreaming = false;
        renderChat();
      }
    }

    function clearFile() {
      currentFile = null;
      document.getElementById('filePreviewArea').innerHTML = '';
    }

    function toggleMessageMenu(sessionId, msgIndex) {
      const id = msgId(sessionId, msgIndex);
      if (activeMenuMessageId === id) {
        activeMenuMessageId = null;
      } else {
        activeMenuMessageId = id;
      }
      renderChat();
    }

    // ========== UI渲染 ==========
    function renderSessionList(filter = '') {
      const list = document.getElementById('sessionList');
      if (!list) return;
      
      list.innerHTML = '';
      
      const sessions = appState.sessionOrder
        .filter(id => appState.sessions[id])
        .filter(id => {
          if (!filter) return true;
          const session = appState.sessions[id];
          return session.title.toLowerCase().includes(filter.toLowerCase());
        });
      
      if (sessions.length === 0) {
        list.innerHTML = '<div style="color:#666; padding:20px; text-align:center;">暂无会话</div>';
        return;
      }
      
      sessions.forEach(id => {
        const s = appState.sessions[id];
        const div = document.createElement('div');
        div.className = `session-item ${id === appState.activeSessionId ? 'active' : ''}`;
        div.innerHTML = `
          <div class="session-info">
            <div class="session-title">${escapeHtml(s.title || '未命名')}</div>
            <div class="session-meta">${s.messages.length}条消息 · ${formatTime(s.updatedAt)}</div>
          </div>
          <div style="display:flex; gap:4px;">
            <button data-rename="${id}" style="background:none;border:none;color:#aaa;cursor:pointer;font-size:0.9rem;">✏️</button>
            <button data-delete="${id}" style="background:none;border:none;color:#aaa;cursor:pointer;font-size:0.9rem;">🗑</button>
          </div>
        `;
        
        // 点击会话信息切换会话
        div.querySelector('.session-info').addEventListener('click', () => {
          appState.activeSessionId = id;
          activeMenuMessageId = null;
          saveState();
          renderChat();
          renderSessionList();
          closeSidebar();
        });
        
        // 重命名按钮
        div.querySelector('[data-rename]').addEventListener('click', (e) => {
          e.stopPropagation();
          const newTitle = prompt('重命名会话:', s.title);
          if (newTitle && newTitle.trim()) {
            renameSession(id, newTitle.trim());
          }
        });
        
        // 删除按钮
        div.querySelector('[data-delete]').addEventListener('click', (e) => {
          e.stopPropagation();
          if (confirm(`确定删除会话"${s.title}"吗？此操作不可恢复。`)) {
            deleteSession(id);
          }
        });
        
        // 长按重命名
        let longPressTimer;
        div.addEventListener('touchstart', () => {
          longPressTimer = setTimeout(() => {
            const newTitle = prompt('重命名会话:', s.title);
            if (newTitle && newTitle.trim()) {
              renameSession(id, newTitle.trim());
            }
          }, 800);
        });
        div.addEventListener('touchend', () => clearTimeout(longPressTimer));
        div.addEventListener('touchmove', () => clearTimeout(longPressTimer));
        
        list.appendChild(div);
      });
    }

    function renderChat() {
      const session = getActiveSession();
      const container = document.getElementById('messagesContainer');
      const titleElement = document.getElementById('chatTitle');
      
      if (!container || !titleElement) return;
      
      titleElement.textContent = session ? (session.title || '对话') : 'DeepSeek 助手';
      container.innerHTML = '';
      
      if (!session) {
        container.innerHTML = '<div style="color:#666;text-align:center;margin-top:40%;">选择一个会话或创建新对话</div>';
        return;
      }
      
      if (session.messages.length === 0) {
        container.innerHTML = '<div style="color:#666;text-align:center;margin-top:40%;">开始新对话吧</div>';
        return;
      }
      
      session.messages.forEach((msg, idx) => {
        const row = document.createElement('div');
        row.className = `message-row ${msg.role}`;
        
        const avatar = msg.role === 'user' ? appState.userAvatar : appState.assistantAvatar;
        
        // 获取显示内容
        let displayContent;
        if (msg.role === 'user' && msg._hasEdits) {
          displayContent = getUserMessageDisplayContent(msg);
        } else {
          displayContent = msg.content;
        }
        
        if (msg.isError) {
          displayContent = '❌ ' + displayContent;
        }
        
        const menuId = msgId(session.id, idx);
        const isMenuVisible = activeMenuMessageId === menuId && !isStreaming;
        
        // 构建操作按钮
        let actionsHtml = '';
        if (msg.role === 'user' && !isStreaming) {
          actionsHtml += `<button class="action-btn edit-msg-btn" data-idx="${idx}">✏️ 编辑</button>`;
          
          if (msg._hasEdits && msg.editHistory && msg.editHistory.length > 0) {
            const cur = msg._currentVersionIndex ?? msg.editHistory.length;
            const max = msg.editHistory.length;
            actionsHtml += `
              <span class="version-controls">
                <button class="version-btn user-ver-prev" data-idx="${idx}" ${cur === 0 ? 'disabled' : ''}>◀</button>
                <span class="version-info">${cur + 1}/${max + 1}</span>
                <button class="version-btn user-ver-next" data-idx="${idx}" ${cur === max ? 'disabled' : ''}>▶</button>
              </span>
            `;
            if (cur < max) {
              actionsHtml += '<span class="editing-indicator">(历史版本)</span>';
            }
          }
        }
        
        if (msg.role === 'assistant' && !msg.isError && !isStreaming) {
          actionsHtml += `<button class="action-btn regen-btn" data-idx="${idx}">🔄 重新生成</button>`;
          
          if (msg.regeneratedVersions && msg.regeneratedVersions.length > 0) {
            const cur = msg._currentRegeneratedIndex ?? msg.regeneratedVersions.length;
            const max = msg.regeneratedVersions.length;
            actionsHtml += `
              <span class="version-controls">
                <button class="version-btn regen-ver-prev" data-idx="${idx}" ${cur === 0 ? 'disabled' : ''}>◀</button>
                <span class="version-info">版本${cur + 1}/${max + 1}</span>
                <button class="version-btn regen-ver-next" data-idx="${idx}" ${cur === max ? 'disabled' : ''}>▶</button>
              </span>
            `;
          }
        }
        
        const bubbleHtml = `<div class="bubble" data-menu-id="${menuId}">${escapeHtml(displayContent)}</div>`;
        const actionsVisibility = isMenuVisible ? 'visible' : '';
        const isRegenerated = msg._isRegenerated || (msg.regeneratedVersions && msg.regeneratedVersions.length > 0);
        
        row.innerHTML = `
          <div class="message-wrapper" style="width:100%;">
            ${msg.role === 'user' ? `
              <div style="flex:1;display:flex;flex-direction:column;align-items:flex-end;">
                ${isRegenerated ? `<div class="regenerated-block">${bubbleHtml}</div>` : bubbleHtml}
                <div class="message-actions ${actionsVisibility}" style="justify-content:flex-end;">${actionsHtml}</div>
              </div>
              <span class="avatar">${avatar}</span>
            ` : `
              <span class="avatar">${avatar}</span>
              <div style="flex:1;">
                ${isRegenerated ? `<div class="regenerated-block">${bubbleHtml}</div>` : bubbleHtml}
                <div class="message-actions ${actionsVisibility}">${actionsHtml}</div>
              </div>
            `}
          </div>
        `;
        
        container.appendChild(row);
        
        // 绑定事件
        setTimeout(() => {
          const bubble = row.querySelector('.bubble');
          if (bubble) {
            bubble.addEventListener('click', (e) => {
              e.stopPropagation();
              toggleMessageMenu(session.id, idx);
            });
          }
          
          row.querySelector('.edit-msg-btn')?.addEventListener('click', (e) => {
            e.stopPropagation();
            editAndResend(session, idx);
          });
          
          row.querySelector('.regen-btn')?.addEventListener('click', (e) => {
            e.stopPropagation();
            regenerateAnswer(session, idx);
          });
          
          row.querySelector('.user-ver-prev')?.addEventListener('click', (e) => {
            e.stopPropagation();
            if (switchUserMessageVersion(session, idx, 'prev')) {
              renderChat();
            }
          });
          
          row.querySelector('.user-ver-next')?.addEventListener('click', (e) => {
            e.stopPropagation();
            if (switchUserMessageVersion(session, idx, 'next')) {
              renderChat();
            }
          });
          
          row.querySelector('.regen-ver-prev')?.addEventListener('click', (e) => {
            e.stopPropagation();
            if (switchRegeneratedVersion(session, idx, 'prev')) {
              renderChat();
            }
          });
          
          row.querySelector('.regen-ver-next')?.addEventListener('click', (e) => {
            e.stopPropagation();
            if (switchRegeneratedVersion(session, idx, 'next')) {
              renderChat();
            }
          });
        }, 0);
      });
      
      applyBackground();
      container.scrollTop = container.scrollHeight;
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function applyBackground() {
      const container = document.getElementById('messagesContainer');
      if (!container) return;
      
      container.style.backgroundImage = 'none';
      container.style.background = '';
      
      switch (appState.bgType) {
        case 'color':
          container.style.background = appState.bgValue || '#0a0a0a';
          break;
        case 'gradient':
          container.style.background = appState.bgValue || 'linear-gradient(135deg, #1a1a2e 0%, #16213e 100%)';
          break;
        case 'image':
          if (appState.bgValue) {
            container.style.backgroundImage = `url(${appState.bgValue})`;
            container.style.backgroundSize = 'cover';
            container.style.backgroundPosition = 'center';
          }
          break;
      }
    }

    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
    }

    // ========== 全局事件 ==========
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.bubble') && !e.target.closest('.message-actions')) {
        if (activeMenuMessageId !== null) {
          activeMenuMessageId = null;
          renderChat();
        }
      }
    });

    // ========== 事件绑定 ==========
    function setupEventListeners() {
      document.getElementById('menuBtn').addEventListener('click', () => {
        renderSessionList();
        document.getElementById('sidebar').classList.add('open');
      });
      
      document.getElementById('closeSidebarBtn').addEventListener('click', closeSidebar);
      document.getElementById('sidebarBackdrop').addEventListener('click', closeSidebar);
      
      document.getElementById('newChatBtn').addEventListener('click', () => {
        createSession('新对话');
        renderSessionList();
        renderChat();
        closeSidebar();
      });
      
      document.getElementById('searchSessionInput').addEventListener('input', (e) => {
        renderSessionList(e.target.value);
      });
      
      document.getElementById('sendBtn').addEventListener('click', sendMessage);
      
      document.getElementById('attachBtn').addEventListener('click', () => {
        document.getElementById('fileInput').click();
      });
      
      document.getElementById('fileInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        if (file.size > 50 * 1024 * 1024) {
          showToast('文件大小不能超过50MB');
          e.target.value = '';
          return;
        }
        
        try {
          const text = await file.text();
          currentFile = { name: file.name, content: text, size: file.size };
          document.getElementById('filePreviewArea').innerHTML = `
            <div class="file-preview">
              📄 ${escapeHtml(file.name)} (${(file.size / 1024).toFixed(1)} KB)
              <button class="remove-file-btn" onclick="window.clearFile()">✕</button>
            </div>
          `;
        } catch (err) {
          showToast('无法读取文件内容');
        }
        
        e.target.value = '';
      });
      
      window.clearFile = clearFile;
      
      const userInput = document.getElementById('userInput');
      userInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 150) + 'px';
      });
      
      userInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
      
      document.getElementById('settingsBtn').addEventListener('click', () => {
        document.getElementById('settingsPanel').classList.toggle('active');
      });
      
      document.getElementById('closeSettingsBtn').addEventListener('click', () => {
        document.getElementById('settingsPanel').classList.remove('active');
      });
      
      // 设置项绑定
      document.getElementById('apiKeyInput').addEventListener('change', function() {
        appState.apiKey = this.value;
        saveState();
      });
      
      document.getElementById('modelSelect').addEventListener('change', function() {
        appState.model = this.value;
        saveState();
      });
      
      document.getElementById('tempRange').addEventListener('input', function() {
        appState.temperature = parseFloat(this.value);
        document.getElementById('tempValue').textContent = this.value;
        saveState();
      });
      
      document.getElementById('deepThinkCheck').addEventListener('change', function() {
        appState.deepThink = this.checked;
        saveState();
      });
      
      document.getElementById('userAvatarInput').addEventListener('change', function() {
        appState.userAvatar = this.value || '😀';
        saveState();
        renderChat();
      });
      
      document.getElementById('aiAvatarInput').addEventListener('change', function() {
        appState.assistantAvatar = this.value || '🤖';
        saveState();
        renderChat();
      });
      
      document.getElementById('bgTypeSelect').addEventListener('change', function() {
        appState.bgType = this.value;
        saveState();
        applyBackground();
      });
      
      document.getElementById('bgValueInput').addEventListener('input', function() {
        appState.bgValue = this.value;
        saveState();
        applyBackground();
      });
      
      // 导出
      document.getElementById('exportBtn').addEventListener('click', () => {
        const exportData = {
          apiKey: appState.apiKey,
          model: appState.model,
          temperature: appState.temperature,
          deepThink: appState.deepThink,
          bgType: appState.bgType,
          bgValue: appState.bgValue,
          userAvatar: appState.userAvatar,
          assistantAvatar: appState.assistantAvatar,
          sessions: appState.sessions,
          sessionOrder: appState.sessionOrder,
          activeSessionId: appState.activeSessionId
        };
        
        const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `deepseek-chat-backup-${new Date().toISOString().slice(0, 10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('导出成功');
      });
      
      // 导入
      document.getElementById('importBtn').addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        
        input.addEventListener('change', async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          
          try {
            const text = await file.text();
            const data = JSON.parse(text);
            
            if (!data.sessions || !data.sessionOrder) {
              showToast('无效的备份文件格式');
              return;
            }
            
            if (confirm('是否同时导入设置（API Key、模型参数等）？\n\n选择"取消"仅导入会话数据。')) {
              if (data.apiKey !== undefined) appState.apiKey = data.apiKey;
              if (data.model !== undefined) appState.model = data.model;
              if (data.temperature !== undefined) appState.temperature = data.temperature;
              if (data.deepThink !== undefined) appState.deepThink = data.deepThink;
              if (data.bgType !== undefined) appState.bgType = data.bgType;
              if (data.bgValue !== undefined) appState.bgValue = data.bgValue;
              if (data.userAvatar !== undefined) appState.userAvatar = data.userAvatar;
              if (data.assistantAvatar !== undefined) appState.assistantAvatar = data.assistantAvatar;
            }
            
            // 合并会话数据
            Object.keys(data.sessions).forEach(id => {
              if (!appState.sessions[id]) {
                appState.sessions[id] = data.sessions[id];
                if (!appState.sessionOrder.includes(id)) {
                  appState.sessionOrder.push(id);
                }
              }
            });
            
            if (data.activeSessionId && appState.sessions[data.activeSessionId]) {
              appState.activeSessionId = data.activeSessionId;
            } else if (appState.sessionOrder.length > 0) {
              appState.activeSessionId = appState.sessionOrder[0];
            }
            
            await saveState();
            
            // 更新设置界面
            document.getElementById('apiKeyInput').value = appState.apiKey || '';
            document.getElementById('modelSelect').value = appState.model;
            document.getElementById('tempRange').value = appState.temperature;
            document.getElementById('tempValue').textContent = appState.temperature;
            document.getElementById('deepThinkCheck').checked = appState.deepThink;
            document.getElementById('userAvatarInput').value = appState.userAvatar;
            document.getElementById('aiAvatarInput').value = appState.assistantAvatar;
            document.getElementById('bgTypeSelect').value = appState.bgType;
            document.getElementById('bgValueInput').value = appState.bgValue || '';
            
            renderSessionList();
            renderChat();
            applyBackground();
            showToast('导入成功');
          } catch (err) {
            console.error('导入失败:', err);
            showToast('文件解析失败，请检查文件格式');
          }
        });
        
        input.click();
      });
    }

    // ========== 初始化 - 修复数据持久化问题 ==========
    async function initialize() {
      try {
        // 1. 打开数据库
        await openDB();
        
        // 2. 加载保存的状态
        await loadState();
        
        // 3. 确保有活跃会话
        if (Object.keys(appState.sessions).length === 0) {
          createSession('欢迎使用');
        }
        
        if (!appState.activeSessionId || !appState.sessions[appState.activeSessionId]) {
          appState.activeSessionId = appState.sessionOrder[0];
        }
        
        // 4. 恢复设置界面
        document.getElementById('apiKeyInput').value = appState.apiKey || '';
        document.getElementById('modelSelect').value = appState.model || 'deepseek-chat';
        document.getElementById('tempRange').value = appState.temperature;
        document.getElementById('tempValue').textContent = appState.temperature;
        document.getElementById('deepThinkCheck').checked = appState.deepThink;
        document.getElementById('userAvatarInput').value = appState.userAvatar;
        document.getElementById('aiAvatarInput').value = appState.assistantAvatar;
        document.getElementById('bgTypeSelect').value = appState.bgType;
        document.getElementById('bgValueInput').value = appState.bgValue || '';
        
        // 5. 设置事件监听
        setupEventListeners();
        
        // 6. 渲染界面
        renderSessionList();
        renderChat();
        applyBackground();
        
        console.log('初始化完成，会话数:', Object.keys(appState.sessions).length);
      } catch (error) {
        console.error('初始化失败:', error);
        showToast('加载数据失败，请刷新页面重试');
      }
    }

    // 启动应用
    initialize();
  })();
</script>
</body>
</html>
