<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
  <title>DeepSeek AI 全能助手</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans', sans-serif;
    }
    body {
      background: #0a0a0a;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    #app {
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      position: relative;
      max-width: 600px;
      margin: 0 auto;
      box-shadow: 0 0 30px rgba(0,0,0,0.7);
      overflow: hidden;
    }
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 80%;
      max-width: 320px;
      height: 100%;
      background: #121212;
      z-index: 100;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      display: flex;
      flex-direction: column;
      box-shadow: 2px 0 15px rgba(0,0,0,0.5);
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 99;
      display: none;
    }
    .sidebar.open + .sidebar-backdrop { display: block; }
    .sidebar-header {
      padding: 20px 16px;
      border-bottom: 1px solid #2a2a2a;
      color: #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sidebar-header h3 { font-size: 1.2rem; font-weight: 500; }
    .close-sidebar-btn {
      background: none;
      border: none;
      color: #aaa;
      font-size: 1.5rem;
      cursor: pointer;
      padding: 5px;
    }
    .search-session { margin: 10px; padding: 10px 12px; background: #1e1e1e; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 0.9rem; outline: none; }
    .session-list { flex: 1; overflow-y: auto; padding: 8px; }
    .session-item {
      padding: 12px; margin-bottom: 4px; border-radius: 8px; background: #1a1a1a; color: #ddd; cursor: pointer;
      display: flex; justify-content: space-between; align-items: center; transition: background 0.15s; border: 1px solid transparent;
    }
    .session-item.active { border-color: #4f8cff; background: #1e2a3a; }
    .session-info { flex: 1; overflow: hidden; }
    .session-title { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .session-meta { font-size: 0.7rem; color: #888; margin-top: 4px; }
    .new-chat-btn { margin: 10px; padding: 12px; background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 8px; font-weight: 500; cursor: pointer; }
    .main { flex: 1; display: flex; flex-direction: column; height: 100%; background: #0a0a0a; position: relative; }
    .chat-header { padding: 12px 16px; background: #111; display: flex; align-items: center; border-bottom: 1px solid #222; color: #eee; }
    .menu-btn { background: none; border: none; color: #ccc; font-size: 1.5rem; margin-right: 12px; cursor: pointer; }
    .chat-title { flex: 1; font-weight: 500; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .settings-btn { background: none; border: none; color: #ccc; font-size: 1.3rem; cursor: pointer; }
    .messages-container { flex: 1; overflow-y: auto; padding: 16px 12px; display: flex; flex-direction: column; gap: 8px; }
    .message-row { display: flex; flex-direction: column; animation: slideIn 0.2s ease; position: relative; }
    .message-row.user { align-items: flex-end; }
    .message-row.assistant { align-items: flex-start; }
    .message-wrapper { max-width: 90%; display: flex; align-items: flex-start; gap: 6px; }
    .avatar { font-size: 1.5rem; width: 32px; text-align: center; flex-shrink: 0; }
    .bubble {
      background: #1e1e1e; color: #f0f0f0; padding: 10px 14px; border-radius: 16px;
      word-break: break-word; white-space: pre-wrap; position: relative; cursor: pointer; transition: opacity 0.15s;
    }
    .bubble:active { opacity: 0.85; }
    .user .bubble { background: #1f3a5f; }
    .message-actions { display: none; gap: 4px; margin-top: 4px; font-size: 0.7rem; flex-wrap: wrap; align-items: center; animation: fadeIn 0.15s ease; }
    .message-actions.visible { display: flex; }
    .action-btn {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #ccc;
      padding: 2px 8px; border-radius: 10px; cursor: pointer; font-size: 0.7rem; white-space: nowrap; transition: background 0.15s;
    }
    .action-btn:active { background: rgba(255,255,255,0.3); }
    .action-btn:disabled { opacity: 0.4; cursor: default; }
    .regenerated-block { border-left: 3px solid #4f8cff; padding-left: 8px; background: #1a1e26; border-radius: 6px; }
    .version-controls { display: inline-flex; align-items: center; gap: 4px; }
    .version-btn {
      background: #2a2a2a; border: none; color: #ddd; padding: 2px 6px; border-radius: 4px;
      cursor: pointer; font-size: 0.7rem; min-width: 24px; text-align: center; transition: background 0.15s;
    }
    .version-btn:active { background: #3a3a3a; }
    .version-btn:disabled { opacity: 0.35; cursor: default; background: #1a1a1a; }
    .version-info { color: #8ab4f8; font-size: 0.7rem; min-width: 40px; text-align: center; }
    .editing-indicator { color: #ffa500; font-size: 0.65rem; margin-left: 4px; }
    .file-preview {
      background: #1e1e1e; padding: 8px 12px; margin: 0 12px 4px; border-radius: 8px;
      display: flex; align-items: center; gap: 8px; color: #ccc; font-size: 0.8rem; border: 1px solid #333;
    }
    .remove-file-btn { background: none; border: none; color: #ff6b6b; cursor: pointer; font-size: 1rem; }
    .input-area { padding: 10px 12px; background: #111; border-top: 1px solid #222; display: flex; align-items: flex-end; gap: 8px; }
    textarea {
      flex: 1; background: #1e1e1e; border: 1px solid #333; border-radius: 12px; padding: 10px 14px;
      color: #fff; resize: none; max-height: 150px; font-size: 0.95rem; outline: none; line-height: 1.4;
      scrollbar-width: none; -ms-overflow-style: none; overflow-y: auto;
    }
    textarea::-webkit-scrollbar { display: none; width: 0; height: 0; }
    .send-btn { background: #2a4a7f; border: none; color: white; padding: 10px 14px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
    .attach-btn { background: #2a2a2a; border: 1px solid #444; color: white; padding: 10px; border-radius: 12px; cursor: pointer; font-size: 1rem; }
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: #333; color: white; padding: 8px 20px; border-radius: 20px; font-size: 0.9rem; z-index: 200; opacity: 0.9; pointer-events: none;
    }
    .context-indicator {
      position: fixed;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.8);
      color: #8ab4f8;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.7rem;
      z-index: 50;
      pointer-events: none;
    }
    .settings-panel {
      position: fixed; bottom: 0; left: 0; width: 100%; background: #121212; z-index: 110;
      padding: 20px; border-radius: 20px 20px 0 0; color: #eee; max-height: 80vh; overflow-y: auto;
      box-shadow: 0 -5px 20px rgba(0,0,0,0.5); display: none;
    }
    .settings-panel.active { display: block; }
    .setting-row { margin-bottom: 16px; }
    .setting-row label { display: block; font-size: 0.8rem; color: #aaa; margin-bottom: 4px; }
    input, select { width: 100%; padding: 10px; background: #1e1e1e; border: 1px solid #333; border-radius: 8px; color: #fff; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>
<div id="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header"><h3>会话列表</h3><button class="close-sidebar-btn" id="closeSidebarBtn">✕</button></div>
    <input type="text" class="search-session" id="searchSessionInput" placeholder="搜索会话...">
    <div class="session-list" id="sessionList"></div>
    <button class="new-chat-btn" id="newChatBtn">+ 新建会话</button>
  </div>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <div class="main">
    <div class="chat-header">
      <button class="menu-btn" id="menuBtn">☰</button>
      <span class="chat-title" id="chatTitle">DeepSeek 助手</span>
      <button class="settings-btn" id="settingsBtn">⚙️</button>
    </div>
    <div class="messages-container" id="messagesContainer"></div>
    <div class="context-indicator" id="contextIndicator" style="display:none;"></div>
    <div id="filePreviewArea" style="padding:0 12px;"></div>
    <div class="input-area">
      <textarea id="userInput" rows="1" placeholder="输入消息... (Enter发送)"></textarea>
      <input type="file" id="fileInput" accept=".txt,.pdf,.md,.json,.csv,.html,.css,.js,.py,.log,.xml,.yaml,.yml" style="display:none">
      <button class="attach-btn" id="attachBtn">📎</button>
      <button class="send-btn" id="sendBtn">发送</button>
    </div>
  </div>
  <div class="settings-panel" id="settingsPanel">
    <h4 style="margin-bottom:16px;">设置</h4>
    <div class="setting-row"><label>API Key</label><input type="password" id="apiKeyInput" placeholder="sk-..."></div>
    <div class="setting-row"><label>模型</label><select id="modelSelect"><option value="deepseek-chat">deepseek-chat</option><option value="deepseek-reasoner">deepseek-reasoner (R1)</option></select></div>
    <div class="setting-row"><label>Temperature (<span id="tempValue">0.7</span>)</label><input type="range" id="tempRange" min="0" max="2" step="0.1" value="0.7"></div>
    <div class="setting-row"><label>深度思考模式</label><input type="checkbox" id="deepThinkCheck"></div>
    <div class="setting-row"><label>用户头像(emoji)</label><input id="userAvatarInput" value="😀"></div>
    <div class="setting-row"><label>AI头像(emoji)</label><input id="aiAvatarInput" value="🤖"></div>
    <div class="setting-row"><label>背景类型</label><select id="bgTypeSelect"><option value="color">纯色</option><option value="gradient">渐变</option><option value="image">图片URL</option></select></div>
    <div class="setting-row"><input id="bgValueInput" placeholder="#0a0a0a 或渐变 或图片URL"></div>
    <div style="display:flex; gap:8px; margin-top:12px;"><button id="exportBtn" class="action-btn" style="padding:8px 16px;">📤 导出</button><button id="importBtn" class="action-btn" style="padding:8px 16px;">📥 导入</button></div>
    <button id="closeSettingsBtn" style="margin-top:16px; width:100%; padding:10px; background:#333; border:none; color:white; border-radius:8px;">关闭</button>
  </div>
</div>

<script>
(function() {
  const DB_NAME = 'DeepSeekChatDB_V3';
  let db;
  const appState = {
    apiKey: '', model: 'deepseek-chat', temperature: 0.7, deepThink: false,
    bgType: 'color', bgValue: '#0a0a0a', userAvatar: '😀', assistantAvatar: '🤖',
    activeSessionId: null, sessions: {}, sessionOrder: []
  };
  let currentFile = null, isStreaming = false, activeMenuMessageId = null;

  // ========== IndexedDB ==========
  function openDB() {
    return new Promise((resolve, reject) => {
      const r = indexedDB.open(DB_NAME, 1);
      r.onupgradeneeded = (e) => { if (!e.target.result.objectStoreNames.contains('state')) e.target.result.createObjectStore('state', { keyPath: 'key' }); };
      r.onsuccess = (e) => { db = e.target.result; resolve(db); };
      r.onerror = reject;
    });
  }
  async function saveState() {
    if (!db) await openDB();
    return new Promise((resolve) => {
      const tx = db.transaction('state', 'readwrite');
      tx.objectStore('state').put({ key: 'appState', value: JSON.parse(JSON.stringify(appState)) });
      tx.oncomplete = resolve;
    });
  }
  async function loadState() {
    if (!db) await openDB();
    return new Promise((resolve) => {
      const tx = db.transaction('state', 'readonly');
      const req = tx.objectStore('state').get('appState');
      req.onsuccess = () => { if (req.result?.value) Object.assign(appState, req.result.value); resolve(); };
      req.onerror = () => resolve();
    });
  }

  // ========== 工具 ==========
  function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 9); }
  function formatTime(iso) { if(!iso)return''; const d=new Date(iso); return d.toLocaleDateString()+' '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
  function showToast(msg) { const t=document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2500); }
  function getActiveSession() {
    if(!appState.activeSessionId||!appState.sessions[appState.activeSessionId]) appState.activeSessionId=appState.sessionOrder[0]||null;
    return appState.activeSessionId?appState.sessions[appState.activeSessionId]:null;
  }
  function msgId(sid,idx){return `${sid}_${idx}`;}

  // ========== 会话管理 ==========
  function createSession(title='新对话'){
    const id=generateId();
    const s={id,title,messages:[],createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()};
    appState.sessions[id]=s; appState.sessionOrder.unshift(id); appState.activeSessionId=id; saveState(); return s;
  }
  function deleteSession(id){
    delete appState.sessions[id]; appState.sessionOrder=appState.sessionOrder.filter(i=>i!==id);
    if(appState.activeSessionId===id) appState.activeSessionId=appState.sessionOrder[0]||null;
    if(!appState.activeSessionId) createSession();
    saveState(); renderSessionList(); renderChat();
  }
  function renameSession(id,title){ if(appState.sessions[id]&&title.trim()){appState.sessions[id].title=title.trim();saveState();renderSessionList();renderChat();} }

  // ========== 显示内容获取 ==========
  function getUserDisplayContent(msg) {
    if(!msg.versions||msg.versions.length===0) return msg.content||'';
    const idx=msg.currentVersionIndex??(msg.versions.length-1);
    return (idx>=0&&idx<msg.versions.length)?msg.versions[idx].content:(msg.content||'');
  }
  function getAssistantDisplayContent(msg) {
    if(!msg.versions||msg.versions.length===0) return msg.content||'';
    const idx=msg.currentVersionIndex??(msg.versions.length-1);
    return (idx>=0&&idx<msg.versions.length)?msg.versions[idx].content:(msg.content||'');
  }
  function getUserCurrentVersionIndex(msg) {
    if(!msg.versions||msg.versions.length===0) return 0;
    return msg.currentVersionIndex??(msg.versions.length-1);
  }
  function getAssistantCurrentVersionIndex(msg) {
    if(!msg.versions||msg.versions.length===0) return 0;
    return msg.currentVersionIndex??(msg.versions.length-1);
  }

  // ========== 【核心】构建完整的上下文消息数组 ==========
  // 从第一条消息到指定索引之前的所有消息，使用各自当前查看的版本内容
  function buildContextMessages(session, upToIndex) {
    const contextMessages = [];
    // upToIndex 是开区间，不包含 upToIndex 本身
    // 如果 upToIndex 未指定，则包含所有消息
    const endIndex = upToIndex !== undefined ? upToIndex : session.messages.length;
    
    console.log(`[上下文] 构建从0到${endIndex}的上下文，共有${session.messages.length}条消息`);
    
    for (let i = 0; i < endIndex; i++) {
      const msg = session.messages[i];
      if (!msg) continue;
      if (msg.isError) continue; // 跳过错误消息
      
      let content;
      if (msg.role === 'user') {
        content = getUserDisplayContent(msg);
      } else if (msg.role === 'assistant') {
        content = getAssistantDisplayContent(msg);
        // 跳过占位符或空内容
        if (!content || content.trim() === '') continue;
      } else {
        content = msg.content || '';
      }
      
      if (content && content.trim() !== '') {
        contextMessages.push({ role: msg.role, content: content });
        console.log(`[上下文] 第${i}条消息 (${msg.role}): ${content.substring(0, 50)}...`);
      }
    }
    
    console.log(`[上下文] 最终构建了${contextMessages.length}条上下文消息`);
    
    // 显示上下文指示器
    const indicator = document.getElementById('contextIndicator');
    if (indicator) {
      indicator.textContent = `上下文: ${contextMessages.length}条消息`;
      indicator.style.display = 'block';
      setTimeout(() => { indicator.style.display = 'none'; }, 3000);
    }
    
    return contextMessages;
  }

  // ========== 编辑用户消息 ==========
  function editUserMessage(session, messageIndex, newContent) {
    const msg = session.messages[messageIndex];
    if (!msg || msg.role !== 'user') return false;
    
    if (!msg.versions || msg.versions.length === 0) {
      msg.versions = [{ content: msg.content || '', editedAt: new Date().toISOString() }];
      msg.currentVersionIndex = 0;
    }
    
    msg.versions.push({ content: newContent.trim(), editedAt: new Date().toISOString() });
    msg.currentVersionIndex = msg.versions.length - 1;
    msg.content = newContent.trim();
    
    // 删除该用户消息之后的所有消息（因为对话已经改变）
    const deletedCount = session.messages.length - messageIndex - 1;
    session.messages = session.messages.slice(0, messageIndex + 1);
    session.updatedAt = new Date().toISOString();
    saveState();
    
    console.log(`[编辑] 编辑了第${messageIndex}条消息，删除了${deletedCount}条后续消息`);
    return true;
  }

  // 切换用户消息版本
  function switchUserMessageVersion(session, messageIndex, direction) {
    const msg = session.messages[messageIndex];
    if (!msg?.versions || msg.versions.length === 0) return false;
    
    let currentIdx = msg.currentVersionIndex ?? (msg.versions.length - 1);
    if (direction === 'prev' && currentIdx > 0) currentIdx--;
    else if (direction === 'next' && currentIdx < msg.versions.length - 1) currentIdx++;
    else return false;
    
    msg.currentVersionIndex = currentIdx;
    
    // 同步切换对应的AI回答版本
    const aiMsgIndex = messageIndex + 1;
    if (aiMsgIndex < session.messages.length && session.messages[aiMsgIndex].role === 'assistant') {
      const aiMsg = session.messages[aiMsgIndex];
      if (aiMsg.versions && aiMsg.versions.length > currentIdx) {
        aiMsg.currentVersionIndex = currentIdx;
      }
    }
    
    saveState();
    console.log(`[版本切换] 用户消息${messageIndex}切换到版本${currentIdx+1}/${msg.versions.length}`);
    return true;
  }

  // 重新生成AI回答 - 使用完整上下文
  async function regenerateAnswer(session, aiMessageIndex) {
    if (isStreaming) { showToast('请等待当前请求完成'); return; }
    if (aiMessageIndex < 1) return;
    
    // 构建完整上下文（到该AI消息之前的所有消息）
    const contextMessages = buildContextMessages(session, aiMessageIndex);
    
    console.log(`[重新生成] 使用${contextMessages.length}条上下文消息重新生成第${aiMessageIndex}条AI回答`);
    
    isStreaming = true;
    activeMenuMessageId = null;
    renderChat();
    
    try {
      const newContent = await callDeepSeekAPI(contextMessages);
      const aiMsg = session.messages[aiMessageIndex];
      
      if (!aiMsg.versions || aiMsg.versions.length === 0) {
        aiMsg.versions = [{ content: aiMsg.content || '', timestamp: new Date().toISOString() }];
        aiMsg.currentVersionIndex = 0;
      }
      
      aiMsg.versions.push({ content: newContent, timestamp: new Date().toISOString() });
      aiMsg.currentVersionIndex = aiMsg.versions.length - 1;
      aiMsg.content = newContent;
      aiMsg.isError = false;
      
      session.updatedAt = new Date().toISOString();
      saveState();
      console.log(`[重新生成] 完成，现在有${aiMsg.versions.length}个版本`);
    } catch (e) {
      showToast('重新生成失败: ' + e.message);
    } finally {
      isStreaming = false;
      renderChat();
    }
  }

  // 切换AI回答版本
  function switchAssistantVersion(session, aiMessageIndex, direction) {
    const msg = session.messages[aiMessageIndex];
    if (!msg?.versions || msg.versions.length === 0) return false;
    
    let currentIdx = msg.currentVersionIndex ?? (msg.versions.length - 1);
    if (direction === 'prev' && currentIdx > 0) currentIdx--;
    else if (direction === 'next' && currentIdx < msg.versions.length - 1) currentIdx++;
    else return false;
    
    msg.currentVersionIndex = currentIdx;
    saveState();
    console.log(`[AI版本切换] AI消息${aiMessageIndex}切换到版本${currentIdx+1}/${msg.versions.length}`);
    return true;
  }

  // ========== API ==========
  async function callDeepSeekAPI(messages) {
    if (!appState.apiKey) throw new Error('请先设置API Key');
    if (messages.length === 0) throw new Error('消息列表为空');
    
    const model = appState.deepThink ? 'deepseek-reasoner' : appState.model;
    
    console.log(`[API] 发送请求，模型: ${model}, 消息数: ${messages.length}`);
    
    const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${appState.apiKey}` },
      body: JSON.stringify({ model, messages, temperature: appState.temperature, max_tokens: appState.deepThink ? 4000 : 2000, stream: false })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      if (res.status === 401) throw new Error('API Key 无效');
      if (res.status === 402) throw new Error('余额不足');
      if (res.status === 429) throw new Error('请求太频繁');
      throw new Error(err.error?.message || `API错误 ${res.status}`);
    }
    const data = await res.json();
    console.log(`[API] 收到回复，长度: ${data.choices[0].message.content.length}`);
    return data.choices[0].message.content;
  }

  // ========== 发送消息（使用完整上下文）==========
  async function sendMessage() {
    if (isStreaming) { showToast('请等待'); return; }
    const text = document.getElementById('userInput').value.trim();
    if (!text && !currentFile) return;
    
    let session = getActiveSession();
    if (!session) session = createSession();
    
    let fullContent = text;
    if (currentFile) fullContent = `[文件: ${currentFile.name}]\n${currentFile.content}\n\n${text || '请分析'}`;
    
    const userMsg = {
      role: 'user',
      content: fullContent,
      versions: [{ content: fullContent, editedAt: new Date().toISOString() }],
      currentVersionIndex: 0,
      isError: false
    };
    session.messages.push(userMsg);
    session.updatedAt = new Date().toISOString();
    if (session.messages.filter(m => m.role === 'user').length === 1) session.title = fullContent.substring(0, 30) || '新对话';
    saveState();
    
    document.getElementById('userInput').value = '';
    document.getElementById('userInput').style.height = 'auto';
    clearFile();
    activeMenuMessageId = null;
    renderChat();
    
    isStreaming = true;
    
    // 构建完整上下文（从第一条到刚添加的用户消息）
    const contextMessages = buildContextMessages(session, session.messages.length);
    
    console.log(`[发送消息] 使用${contextMessages.length}条上下文消息，其中包含从第1条到第${session.messages.length}条的全部消息`);
    
    try {
      const reply = await callDeepSeekAPI(contextMessages);
      session.messages.push({
        role: 'assistant',
        content: reply,
        versions: [{ content: reply, timestamp: new Date().toISOString() }],
        currentVersionIndex: 0,
        isError: false
      });
      session.updatedAt = new Date().toISOString();
      saveState();
      console.log(`[发送消息] AI回复完成，会话总消息数: ${session.messages.length}`);
    } catch (e) {
      session.messages.push({
        role: 'assistant', content: e.message,
        versions: [{ content: e.message, timestamp: new Date().toISOString() }],
        currentVersionIndex: 0, isError: true
      });
      session.updatedAt = new Date().toISOString();
      saveState();
      showToast(e.message);
    } finally {
      isStreaming = false;
      renderChat();
    }
  }

  // 编辑并重新发送（使用完整上下文）
  async function editAndResend(session, messageIndex) {
    const msg = session.messages[messageIndex];
    if (!msg || msg.role !== 'user') return;
    const currentDisplay = getUserDisplayContent(msg);
    const newContent = prompt('编辑消息:', currentDisplay);
    if (newContent === null || newContent.trim() === '' || newContent.trim() === currentDisplay) return;
    if (isStreaming) { showToast('请等待'); return; }
    
    console.log(`[编辑重发] 编辑第${messageIndex}条消息: "${currentDisplay.substring(0,30)}..." -> "${newContent.substring(0,30)}..."`);
    
    // 编辑消息（添加新版本，删除后续对话）
    editUserMessage(session, messageIndex, newContent.trim());
    
    activeMenuMessageId = null;
    renderChat();
    
    isStreaming = true;
    
    // 构建完整上下文（从第一条到编辑后的消息）
    const contextMessages = buildContextMessages(session, session.messages.length);
    
    console.log(`[编辑重发] 使用${contextMessages.length}条上下文消息生成新回复`);
    
    try {
      const reply = await callDeepSeekAPI(contextMessages);
      session.messages.push({
        role: 'assistant',
        content: reply,
        versions: [{ content: reply, timestamp: new Date().toISOString() }],
        currentVersionIndex: 0,
        isError: false
      });
      session.updatedAt = new Date().toISOString();
      saveState();
    } catch (e) {
      session.messages.push({
        role: 'assistant', content: e.message,
        versions: [{ content: e.message, timestamp: new Date().toISOString() }],
        currentVersionIndex: 0, isError: true
      });
      session.updatedAt = new Date().toISOString();
      saveState();
    } finally {
      isStreaming = false;
      renderChat();
    }
  }

  function clearFile() { currentFile = null; document.getElementById('filePreviewArea').innerHTML = ''; }
  function toggleMessageMenu(sid, idx) { const id = msgId(sid, idx); activeMenuMessageId = activeMenuMessageId === id ? null : id; renderChat(); }

  // ========== 渲染 ==========
  function renderSessionList(filter = '') {
    const list = document.getElementById('sessionList');
    list.innerHTML = '';
    appState.sessionOrder.filter(id => appState.sessions[id]).forEach(id => {
      const s = appState.sessions[id];
      if (filter && !s.title.toLowerCase().includes(filter.toLowerCase())) return;
      const div = document.createElement('div');
      div.className = `session-item ${id === appState.activeSessionId ? 'active' : ''}`;
      div.innerHTML = `<div class="session-info"><div class="session-title">${s.title||'未命名'}</div><div class="session-meta">${s.messages.length}条 · ${formatTime(s.updatedAt)}</div></div><div><button data-rename="${id}" style="background:none;border:none;color:#aaa;cursor:pointer;">✏️</button><button data-delete="${id}" style="background:none;border:none;color:#aaa;cursor:pointer;">🗑</button></div>`;
      div.querySelector('.session-info').onclick = () => { appState.activeSessionId = id; activeMenuMessageId = null; saveState(); renderChat(); renderSessionList(); closeSidebar(); };
      div.querySelector('[data-rename]').onclick = (e) => { e.stopPropagation(); const t = prompt('重命名:', s.title); if (t?.trim()) renameSession(id, t); };
      div.querySelector('[data-delete]').onclick = (e) => { e.stopPropagation(); if (confirm('删除会话？')) deleteSession(id); };
      list.appendChild(div);
    });
  }

  function renderChat() {
    const session = getActiveSession();
    const container = document.getElementById('messagesContainer');
    document.getElementById('chatTitle').textContent = session?.title || 'DeepSeek 助手';
    container.innerHTML = '';
    if (!session) { container.innerHTML = '<div style="color:#666;text-align:center;margin-top:40%;">选择或创建会话</div>'; return; }
    
    session.messages.forEach((msg, idx) => {
      const row = document.createElement('div');
      row.className = `message-row ${msg.role}`;
      const avatar = msg.role === 'user' ? appState.userAvatar : appState.assistantAvatar;
      
      let displayContent;
      if (msg.role === 'user') {
        displayContent = getUserDisplayContent(msg);
      } else {
        displayContent = getAssistantDisplayContent(msg);
      }
      if (msg.isError) displayContent = '❌ ' + displayContent;
      
      const menuId = msgId(session.id, idx);
      const isMenuVisible = activeMenuMessageId === menuId && !isStreaming;
      const hasMultipleVersions = msg.versions && msg.versions.length > 1;
      
      let actionsHtml = '';
      if (msg.role === 'user') {
        actionsHtml += `<button class="action-btn edit-msg-btn" data-idx="${idx}">✏️ 编辑</button>`;
        if (hasMultipleVersions) {
          const cur = getUserCurrentVersionIndex(msg);
          const total = msg.versions.length;
          actionsHtml += `<span class="version-controls">
            <button class="version-btn user-ver-prev" data-idx="${idx}" ${cur===0?'disabled':''}>◀</button>
            <span class="version-info">${cur+1}/${total}</span>
            <button class="version-btn user-ver-next" data-idx="${idx}" ${cur===total-1?'disabled':''}>▶</button>
          </span>`;
          if (cur < total - 1) actionsHtml += '<span class="editing-indicator">(查看旧版)</span>';
        }
      }
      if (msg.role === 'assistant' && !msg.isError) {
        actionsHtml += `<button class="action-btn regen-btn" data-idx="${idx}">🔄 重新生成</button>`;
        if (hasMultipleVersions) {
          const cur = getAssistantCurrentVersionIndex(msg);
          const total = msg.versions.length;
          actionsHtml += `<span class="version-controls">
            <button class="version-btn ai-ver-prev" data-idx="${idx}" ${cur===0?'disabled':''}>◀</button>
            <span class="version-info">版本${cur+1}/${total}</span>
            <button class="version-btn ai-ver-next" data-idx="${idx}" ${cur===total-1?'disabled':''}>▶</button>
          </span>`;
        }
      }
      
      const bubbleHtml = `<div class="bubble" data-menu-id="${menuId}">${escapeHtml(displayContent)}</div>`;
      const actionsVisibility = isMenuVisible ? 'visible' : '';
      
      row.innerHTML = `<div class="message-wrapper" style="width:100%;">
        ${msg.role==='user' ? `
          <div style="flex:1;display:flex;flex-direction:column;align-items:flex-end;">
            ${hasMultipleVersions ? `<div class="regenerated-block">${bubbleHtml}</div>` : bubbleHtml}
            <div class="message-actions ${actionsVisibility}" style="justify-content:flex-end;">${actionsHtml}</div>
          </div><span class="avatar">${avatar}</span>` : `
          <span class="avatar">${avatar}</span>
          <div style="flex:1;">
            ${hasMultipleVersions ? `<div class="regenerated-block">${bubbleHtml}</div>` : bubbleHtml}
            <div class="message-actions ${actionsVisibility}">${actionsHtml}</div>
          </div>`}
      </div>`;
      container.appendChild(row);
      
      setTimeout(() => {
        row.querySelector('.bubble')?.addEventListener('click', (e) => { e.stopPropagation(); toggleMessageMenu(session.id, idx); });
        row.querySelector('.edit-msg-btn')?.addEventListener('click', (e) => { e.stopPropagation(); editAndResend(session, idx); });
        row.querySelector('.regen-btn')?.addEventListener('click', (e) => { e.stopPropagation(); regenerateAnswer(session, idx); });
        row.querySelector('.user-ver-prev')?.addEventListener('click', (e) => { e.stopPropagation(); switchUserMessageVersion(session, idx, 'prev'); renderChat(); });
        row.querySelector('.user-ver-next')?.addEventListener('click', (e) => { e.stopPropagation(); switchUserMessageVersion(session, idx, 'next'); renderChat(); });
        row.querySelector('.ai-ver-prev')?.addEventListener('click', (e) => { e.stopPropagation(); switchAssistantVersion(session, idx, 'prev'); renderChat(); });
        row.querySelector('.ai-ver-next')?.addEventListener('click', (e) => { e.stopPropagation(); switchAssistantVersion(session, idx, 'next'); renderChat(); });
      }, 0);
    });
    applyBackground();
    container.scrollTop = container.scrollHeight;
  }

  function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text || ''; return div.innerHTML; }
  function applyBackground() {
    const c = document.getElementById('messagesContainer');
    c.style.backgroundImage = 'none';
    if (appState.bgType === 'color') c.style.background = appState.bgValue || '#0a0a0a';
    else if (appState.bgType === 'gradient') c.style.background = appState.bgValue;
    else { c.style.background = ''; c.style.backgroundImage = `url(${appState.bgValue})`; c.style.backgroundSize = 'cover'; c.style.backgroundPosition = 'center'; }
  }
  function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); }
  document.addEventListener('click', (e) => { if (!e.target.closest('.bubble') && !e.target.closest('.message-actions') && activeMenuMessageId !== null) { activeMenuMessageId = null; renderChat(); } });

  // ========== 事件 ==========
  document.getElementById('menuBtn').onclick = () => { renderSessionList(); document.getElementById('sidebar').classList.add('open'); };
  document.getElementById('closeSidebarBtn').onclick = closeSidebar;
  document.getElementById('sidebarBackdrop').onclick = closeSidebar;
  document.getElementById('newChatBtn').onclick = () => { createSession(); renderSessionList(); renderChat(); closeSidebar(); };
  document.getElementById('searchSessionInput').oninput = (e) => renderSessionList(e.target.value);
  document.getElementById('sendBtn').onclick = sendMessage;
  document.getElementById('attachBtn').onclick = () => document.getElementById('fileInput').click();
  document.getElementById('fileInput').onchange = async (e) => {
    const file = e.target.files[0]; if (!file) return;
    if (file.size > 50*1024*1024) { showToast('文件≤50MB'); return; }
    try { const text = await file.text(); currentFile = { name: file.name, content: text, size: file.size }; document.getElementById('filePreviewArea').innerHTML = `<div class="file-preview">📄 ${file.name} (${(file.size/1024).toFixed(1)}KB) <button class="remove-file-btn" onclick="window.clearFile()">✕</button></div>`; } catch { showToast('无法读取'); }
  };
  window.clearFile = clearFile;
  const ui = document.getElementById('userInput');
  ui.addEventListener('input', () => { ui.style.height = 'auto'; ui.style.height = Math.min(ui.scrollHeight, 150) + 'px'; });
  ui.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
  document.getElementById('settingsBtn').onclick = () => document.getElementById('settingsPanel').classList.toggle('active');
  document.getElementById('closeSettingsBtn').onclick = () => document.getElementById('settingsPanel').classList.remove('active');
  ['apiKeyInput','modelSelect','tempRange','deepThinkCheck','userAvatarInput','aiAvatarInput','bgTypeSelect','bgValueInput'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    const key = id.replace('Input','').replace('Select','').replace('Check','');
    const event = el.type === 'checkbox' ? 'change' : (el.type === 'range' ? 'input' : 'change');
    el.addEventListener(event, function() {
      const val = el.type === 'checkbox' ? el.checked : el.value;
      const stateKey = { apiKey: 'apiKey', model: 'model', temp: 'temperature', deepThink: 'deepThink', userAvatar: 'userAvatar', aiAvatar: 'assistantAvatar', bgType: 'bgType', bgValue: 'bgValue' }[key] || key;
      appState[stateKey] = stateKey === 'temperature' ? parseFloat(val) : val;
      if (stateKey === 'temperature') document.getElementById('tempValue').textContent = val;
      saveState();
      if (['userAvatar','assistantAvatar'].includes(stateKey)) renderChat();
      if (['bgType','bgValue'].includes(stateKey)) applyBackground();
    });
  });
  document.getElementById('exportBtn').onclick = () => {
    const blob = new Blob([JSON.stringify({...appState}, null, 2)], { type: 'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `deepseek-${new Date().toISOString().slice(0,10)}.json`; a.click(); showToast('导出成功');
  };
  document.getElementById('importBtn').onclick = () => {
    const inp = document.createElement('input'); inp.type = 'file'; inp.accept = '.json';
    inp.onchange = async (e) => {
      try {
        const text = await e.target.files[0].text(); const data = JSON.parse(text);
        if (data.sessions) {
          Object.keys(data.sessions).forEach(id => { if (!appState.sessions[id]) { appState.sessions[id] = data.sessions[id]; appState.sessionOrder.push(id); } });
          if (confirm('同时导入设置？')) ['apiKey','model','temperature','deepThink','bgType','bgValue','userAvatar','assistantAvatar'].forEach(k => { if (data[k] !== undefined) appState[k] = data[k]; });
          appState.activeSessionId = data.activeSessionId || appState.sessionOrder[0];
          saveState(); renderSessionList(); renderChat();
          document.getElementById('apiKeyInput').value = appState.apiKey; document.getElementById('modelSelect').value = appState.model;
          document.getElementById('tempRange').value = appState.temperature; document.getElementById('tempValue').textContent = appState.temperature;
          document.getElementById('deepThinkCheck').checked = appState.deepThink; showToast('导入成功');
        }
      } catch { showToast('文件无效'); }
    };
    inp.click();
  };

  // ========== 初始化 ==========
  (async () => {
    await openDB(); await loadState();
    if (!Object.keys(appState.sessions).length) createSession('欢迎使用');
    if (!appState.activeSessionId || !appState.sessions[appState.activeSessionId]) appState.activeSessionId = appState.sessionOrder[0];
    
    // 数据迁移
    let migrated = false;
    Object.values(appState.sessions).forEach(s => {
      s.messages.forEach(msg => {
        if (!msg.versions || msg.versions.length === 0) {
          if (msg.content) {
            msg.versions = [{ content: msg.content, timestamp: msg.editedAt || msg._regeneratedAt || new Date().toISOString() }];
            msg.currentVersionIndex = 0;
            migrated = true;
          }
        }
        delete msg._hasEdits; delete msg.editHistory; delete msg._originalContent;
        delete msg._isRegenerated; delete msg.regeneratedVersions; delete msg._regeneratedAt; delete msg._currentRegeneratedIndex;
      });
    });
    if (migrated) { console.log('[迁移] 数据已升级'); saveState(); }
    
    document.getElementById('apiKeyInput').value = appState.apiKey || '';
    document.getElementById('modelSelect').value = appState.model;
    document.getElementById('tempRange').value = appState.temperature;
    document.getElementById('tempValue').textContent = appState.temperature;
    document.getElementById('deepThinkCheck').checked = appState.deepThink;
    document.getElementById('userAvatarInput').value = appState.userAvatar;
    document.getElementById('aiAvatarInput').value = appState.assistantAvatar;
    document.getElementById('bgTypeSelect').value = appState.bgType;
    document.getElementById('bgValueInput').value = appState.bgValue || '';
    renderSessionList(); renderChat(); applyBackground();
    
    console.log('[初始化] 应用就绪，数据库:', DB_NAME);
  })();
})();
</script>
</body>
</html>
