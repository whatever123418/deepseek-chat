<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DeepSeek Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #ffffff;
            --sidebar-bg: #f8fafc;
            --text-color: #1f2937;
            --border-color: #e5e7eb;
            --user-bubble: #3b82f6;
            --assistant-bubble: #f3f4f6;
            --error-color: #ef4444;
            --success-color: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            overflow: hidden; /* 禁止body滚动，只允许内部容器滚动 */
            display: flex;
        }

        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* --- 侧边栏 --- */
        .sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 100;
        }

        .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border-color); }

        .new-chat-btn {
            width: 100%; padding: 12px; background-color: var(--primary-color);
            color: white; border: none; border-radius: 8px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        .search-container { margin-top: 12px; position: relative; }
        .search-input {
            width: 100%; padding: 8px 12px 8px 32px; border: 1px solid var(--border-color);
            border-radius: 6px; font-size: 14px;
        }
        .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #9ca3af; font-size: 12px; }

        .sessions-list { flex: 1; overflow-y: auto; padding: 8px; }

        .session-item {
            padding: 12px; border-radius: 8px; margin-bottom: 4px; cursor: pointer;
            position: relative; transition: background 0.2s;
        }
        .session-item:hover { background-color: rgba(0,0,0,0.05); }
        .session-item.active { background-color: rgba(37, 99, 235, 0.1); border-left: 3px solid var(--primary-color); }
        
        .session-title { font-weight: 500; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .session-meta { font-size: 12px; color: #6b7280; margin-top: 4px; display: flex; justify-content: space-between; }
        
        .session-actions {
            position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
            display: none; gap: 4px; background: rgba(255,255,255,0.8);
        }
        .session-item:hover .session-actions { display: flex; }
        .action-icon { padding: 4px; color: #6b7280; cursor: pointer; }
        .action-icon:hover { color: var(--primary-color); }

        /* --- 主聊天区 --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background-size: cover;
            background-position: center;
        }

        .chat-header {
            padding: 12px 20px; border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
            background-color: rgba(255,255,255,0.9); backdrop-filter: blur(5px);
        }
        .chat-title { font-weight: 600; font-size: 16px; }
        .header-icons { display: flex; gap: 15px; }
        .icon-btn { background: none; border: none; cursor: pointer; color: #4b5563; font-size: 18px; }

        /* 核心修复：消息容器必须 flex: 1 且 overflow-y: auto */
        .messages-container {
            flex: 1; 
            overflow-y: auto; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .message { display: flex; gap: 12px; max-width: 85%; animation: fadeIn 0.3s ease; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .avatar {
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; flex-shrink: 0; background: #e5e7eb;
        }
        .user .avatar { background: var(--user-bubble); color: white; }

        .message-content-wrapper {
            display: flex; flex-direction: column; gap: 4px;
        }

        .message-content {
            padding: 12px 16px; border-radius: 12px;
            font-size: 15px; line-height: 1.6; word-wrap: break-word;
            position: relative;
        }
        .user .message-content { background-color: var(--user-bubble); color: white; border-bottom-right-radius: 2px; }
        .assistant .message-content { background-color: var(--assistant-bubble); color: var(--text-color); border-bottom-left-radius: 2px; }

        /* 深度思考样式 */
        .think-block {
            background: #f1f5f9; border: 1px solid #e2e8f0;
            border-radius: 8px; margin-bottom: 8px; overflow: hidden;
        }
        .think-header {
            padding: 8px 12px; background: #e2e8f0; font-size: 12px;
            color: #64748b; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
        }
        .think-content {
            padding: 12px; font-size: 13px; color: #475569;
            font-family: monospace; white-space: pre-wrap;
            display: none; /* 默认折叠 */
        }
        .think-content.expanded { display: block; }

        /* 版本控制按钮 */
        .version-controls {
            display: flex; gap: 8px; margin-top: 4px; font-size: 12px;
        }
        .ver-btn {
            background: rgba(0,0,0,0.05); border: none; padding: 2px 8px;
            border-radius: 4px; cursor: pointer; color: #6b7280;
        }
        .ver-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .ver-btn:hover:not(:disabled) { background: rgba(0,0,0,0.1); }

        /* 输入区域 */
        .input-area-wrapper {
            padding: 16px; background-color: rgba(255,255,255,0.95);
            border-top: 1px solid var(--border-color);
        }
        
        .file-preview-bar {
            display: none; align-items: center; gap: 8px;
            padding: 8px 12px; background: #f3f4f6; border-radius: 8px;
            margin-bottom: 10px; font-size: 13px;
        }
        .file-preview-bar.active { display: flex; }
        .remove-file { color: #ef4444; cursor: pointer; margin-left: auto; }

        .input-box-container {
            display: flex; gap: 10px; align-items: flex-end;
            background: #fff; border: 1px solid var(--border-color);
            border-radius: 12px; padding: 8px 12px;
        }
        .input-box-container:focus-within { border-color: var(--primary-color); }

        #messageInput {
            flex: 1; border: none; resize: none; outline: none;
            max-height: 150px; min-height: 24px;
            font-size: 15px; line-height: 1.5;
            background: transparent;
        }

        .input-actions { display: flex; gap: 8px; align-items: center; }
        .send-btn {
            background: var(--primary-color); color: white; border: none;
            width: 32px; height: 32px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: background 0.2s;
        }
        .send-btn:disabled { background: #cbd5e1; cursor: not-allowed; }

        /* 设置面板 */
        .settings-panel {
            position: fixed; top: 0; right: -320px; width: 300px; height: 100%;
            background: white; box-shadow: -2px 0 10px rgba(0,0,0,0.1);
            z-index: 200; transition: right 0.3s; padding: 20px; overflow-y: auto;
        }
        .settings-panel.open { right: 0; }
        .setting-group { margin-bottom: 20px; }
        .setting-label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px; }
        .setting-input, .setting-select {
            width: 100%; padding: 8px; border: 1px solid var(--border-color);
            border-radius: 6px; margin-bottom: 8px;
        }
        .close-settings { position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 20px; cursor: pointer; }

        /* Toast */
        .toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 10px 20px;
            border-radius: 20px; font-size: 14px; opacity: 0; pointer-events: none;
            transition: opacity 0.3s; z-index: 300;
        }
        .toast.show { opacity: 1; }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -280px; height: 100%; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
            .sidebar.open { left: 0; }
            .mobile-menu-btn { display: block !important; }
            .message { max-width: 90%; }
        }
        .mobile-menu-btn { display: none; margin-right: 10px; }
        
        /* Markdown 简单样式 */
        .message-content pre {
            background: #1e293b; color: #e2e8f0; padding: 10px;
            border-radius: 6px; overflow-x: auto; margin: 8px 0;
        }
        .message-content code {
            background: rgba(0,0,0,0.1); padding: 2px 4px; border-radius: 3px;
            font-family: monospace;
        }
        .user .message-content code { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

<div class="app-container">
    <!-- 侧边栏 -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" onclick="createNewSession()">
                <i class="fas fa-plus"></i> 新对话
            </button>
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-input" placeholder="搜索会话..." oninput="searchSessions(this.value)">
            </div>
        </div>
        <div class="sessions-list" id="sessionsList"></div>
    </div>

    <!-- 主内容 -->
    <div class="main-content" id="mainContent">
        <div class="chat-header">
            <div style="display:flex; align-items:center;">
                <button class="icon-btn mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                <div class="chat-title" id="chatTitle">DeepSeek Chat</div>
            </div>
            <div class="header-icons">
                <button class="icon-btn" onclick="toggleSettings()"><i class="fas fa-cog"></i></button>
            </div>
        </div>

        <div class="messages-container" id="messagesContainer">
            <!-- 消息将在这里渲染 -->
        </div>

        <div class="input-area-wrapper">
            <div class="file-preview-bar" id="filePreviewBar">
                <i class="fas fa-file-alt"></i>
                <span id="fileNameDisplay">file.txt</span>
                <span class="remove-file" onclick="clearFile()"><i class="fas fa-times"></i></span>
            </div>
            <div class="input-box-container">
                <button class="icon-btn" onclick="document.getElementById('fileInput').click()" title="上传文件">
                    <i class="fas fa-paperclip"></i>
                </button>
                <input type="file" id="fileInput" style="display:none" accept=".txt,.pdf,.md,.json,.csv,.html,.css,.js,.py,.log,.xml,.yaml,.yml">
                
                <textarea id="messageInput" placeholder="输入消息..." rows="1"></textarea>
                
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- 设置面板 -->
    <div class="settings-panel" id="settingsPanel">
        <button class="close-settings" onclick="toggleSettings()">&times;</button>
        <h3 style="margin-bottom:20px;">设置</h3>
        
        <div class="setting-group">
            <label class="setting-label">API Key</label>
            <input type="password" class="setting-input" id="apiKeyInput" placeholder="sk-...">
        </div>
        
        <div class="setting-group">
            <label class="setting-label">模型</label>
            <select class="setting-select" id="modelSelect">
                <option value="deepseek-chat">deepseek-chat</option>
                <option value="deepseek-reasoner">deepseek-reasoner (R1)</option>
            </select>
        </div>

        <div class="setting-group">
            <label class="setting-label">Temperature: <span id="tempVal">0.7</span></label>
            <input type="range" class="setting-input" id="tempRange" min="0" max="2" step="0.1" value="0.7">
        </div>

        <div class="setting-group">
            <label class="setting-label">
                <input type="checkbox" id="deepThinkCheck"> 开启深度思考 (显示推理过程)
            </label>
        </div>

        <div class="setting-group">
            <label class="setting-label">背景颜色</label>
            <input type="color" class="setting-input" id="bgColorPicker" value="#ffffff">
        </div>

        <div class="setting-group">
            <label class="setting-label">用户头像 (Emoji)</label>
            <input type="text" class="setting-input" id="userAvatarInput" value="👤" maxlength="2">
        </div>
        
        <div class="setting-group">
            <label class="setting-label">AI 头像 (Emoji)</label>
            <input type="text" class="setting-input" id="aiAvatarInput" value="🤖" maxlength="2">
        </div>

        <button class="new-chat-btn" style="background:#ef4444; margin-top:20px;" onclick="clearAllData()">清除所有数据</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    // --- 数据库与状态管理 ---
    const DB_NAME = 'DeepSeekChatDB_V2';
    let db;
    let appState = {
        apiKey: '',
        model: 'deepseek-chat',
        temperature: 0.7,
        deepThink: false,
        bgColor: '#ffffff',
        userAvatar: '👤',
        aiAvatar: '🤖',
        sessions: {}, // id -> session object
        sessionOrder: [], // [id1, id2...]
        activeSessionId: null
    };

    let currentFile = null;
    let isGenerating = false;

    // 初始化
    window.onload = async () => {
        await initDB();
        await loadState();
        renderSessions();
        if (appState.sessionOrder.length > 0) {
            loadSession(appState.activeSessionId || appState.sessionOrder);
        } else {
            createNewSession();
        }
        applySettingsToUI();
        
        // 输入框自动高度
        const textarea = document.getElementById('messageInput');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            if(this.value === '') this.style.height = 'auto';
        });
        
        // Enter 发送
        textarea.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // 文件上传监听
        document.getElementById('fileInput').addEventListener('change', handleFileUpload);
    };

    // IndexedDB 操作
    function initDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = (e) => {
                db = e.target.result;
                if (!db.objectStoreNames.contains('state')) {
                    db.createObjectStore('state');
                }
            };
            request.onsuccess = (e) => {
                db = e.target.result;
                resolve();
            };
            request.onerror = (e) => reject(e);
        });
    }

    async function saveState() {
        if (!db) return;
        const tx = db.transaction(['state'], 'readwrite');
        tx.objectStore('state').put(appState, 'globalState');
    }

    async function loadState() {
        if (!db) return;
        return new Promise((resolve) => {
            const tx = db.transaction(['state'], 'readonly');
            const req = tx.objectStore('state').get('globalState');
            req.onsuccess = () => {
                if (req.result) {
                    appState = { ...appState, ...req.result };
                }
                resolve();
            };
        });
    }

    // --- 会话管理 ---
    function createNewSession() {
        const id = 'sess_' + Date.now();
        const session = {
            id,
            title: '新对话',
            messages: [],
            createdAt: Date.now(),
            updatedAt: Date.now()
        };
        appState.sessions[id] = session;
        appState.sessionOrder.unshift(id);
        appState.activeSessionId = id;
        saveState();
        renderSessions();
        loadSession(id);
        if(window.innerWidth <= 768) toggleSidebar(); // 移动端自动关闭侧边栏
    }

    function loadSession(id) {
        appState.activeSessionId = id;
        saveState();
        renderSessions(); // 更新高亮
        renderMessages();
        const sess = appState.sessions[id];
        document.getElementById('chatTitle').innerText = sess.title;
    }

    function deleteSession(id, event) {
        event.stopPropagation();
        if(!confirm('确定删除此会话？')) return;
        delete appState.sessions[id];
        appState.sessionOrder = appState.sessionOrder.filter(sid => sid !== id);
        if (appState.activeSessionId === id) {
            appState.activeSessionId = appState.sessionOrder || null;
        }
        saveState();
        renderSessions();
        if (appState.activeSessionId) loadSession(appState.activeSessionId);
        else {
            document.getElementById('messagesContainer').innerHTML = '';
            document.getElementById('chatTitle').innerText = 'DeepSeek Chat';
        }
    }

    function renameSession(id, event) {
        event.stopPropagation();
        const sess = appState.sessions[id];
        const newName = prompt('重命名会话:', sess.title);
        if (newName) {
            sess.title = newName.substring(0, 20);
            saveState();
            renderSessions();
            if (appState.activeSessionId === id) document.getElementById('chatTitle').innerText = newName;
        }
    }

    function renderSessions() {
        const list = document.getElementById('sessionsList');
        list.innerHTML = '';
        appState.sessionOrder.forEach(id => {
            const sess = appState.sessions[id];
            if (!sess) return;
            const div = document.createElement('div');
            div.className = `session-item ${id === appState.activeSessionId ? 'active' : ''}`;
            div.onclick = () => loadSession(id);
            div.innerHTML = `
                <div class="session-title">${escapeHtml(sess.title)}</div>
                <div class="session-meta">
                    <span>${sess.messages.length} 条</span>
                    <span>${new Date(sess.updatedAt).toLocaleDateString()}</span>
                </div>
                <div class="session-actions">
                    <i class="fas fa-edit action-icon" onclick="renameSession('${id}', event)"></i>
                    <i class="fas fa-trash action-icon" onclick="deleteSession('${id}', event)"></i>
                </div>
            `;
            list.appendChild(div);
        });
    }

    function searchSessions(keyword) {
        const items = document.querySelectorAll('.session-item');
        items.forEach(item => {
            const title = item.querySelector('.session-title').innerText.toLowerCase();
            item.style.display = title.includes(keyword.toLowerCase()) ? 'block' : 'none';
        });
    }

    // --- 消息渲染与核心逻辑 ---
    function renderMessages() {
        const container = document.getElementById('messagesContainer');
        container.innerHTML = '';
        const sess = appState.sessions[appState.activeSessionId];
        if (!sess) return;

        sess.messages.forEach((msg, index) => {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${msg.role}`;
            
            // 头像
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.innerText = msg.role === 'user' ? appState.userAvatar : appState.aiAvatar;
            
            // 内容包装器
            const contentWrapper = document.createElement('div');
            contentWrapper.className = 'message-content-wrapper';

            // 深度思考块 (仅 Assistant 且存在 reasoning_content)
            if (msg.role === 'assistant' && msg.reasoning_content) {
                const thinkBlock = document.createElement('div');
                thinkBlock.className = 'think-block';
                thinkBlock.innerHTML = `
                    <div class="think-header" onclick="this.nextElementSibling.classList.toggle('expanded')">
                        <span><i class="fas fa-brain"></i> 深度思考过程</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="think-content expanded">${formatMarkdown(msg.reasoning_content)}</div>
                `;
                contentWrapper.appendChild(thinkBlock);
            }

            // 主内容气泡
            const bubble = document.createElement('div');
            bubble.className = 'message-content';
            bubble.innerHTML = formatMarkdown(msg.content);
            contentWrapper.appendChild(bubble);

            // 版本控制 (如果有多个版本)
            if (msg.versions && msg.versions.length > 1) {
                const verControls = document.createElement('div');
                verControls.className = 'version-controls';
                const currentVerIndex = msg.currentVerIndex || 0;
                
                const prevBtn = document.createElement('button');
                prevBtn.className = 'ver-btn';
                prevBtn.innerText = '<';
                prevBtn.disabled = currentVerIndex === 0;
                prevBtn.onclick = () => switchVersion(index, -1);

                const nextBtn = document.createElement('button');
                nextBtn.className = 'ver-btn';
                nextBtn.innerText = '>';
                nextBtn.disabled = currentVerIndex === msg.versions.length - 1;
                nextBtn.onclick = () => switchVersion(index, 1);

                const verInfo = document.createElement('span');
                verInfo.innerText = `${currentVerIndex + 1}/${msg.versions.length}`;

                verControls.appendChild(prevBtn);
                verControls.appendChild(verInfo);
                verControls.appendChild(nextBtn);
                contentWrapper.appendChild(verControls);
            }

            msgDiv.appendChild(avatar);
            msgDiv.appendChild(contentWrapper);
            container.appendChild(msgDiv);
        });

        scrollToBottom();
    }

    function scrollToBottom() {
        const container = document.getElementById('messagesContainer');
        // 强制滚动到底部
        setTimeout(() => {
            container.scrollTop = container.scrollHeight;
        }, 50);
    }

    function switchVersion(msgIndex, direction) {
        const sess = appState.sessions[appState.activeSessionId];
        const msg = sess.messages[msgIndex];
        if (!msg.versions) return;

        let newIndex = msg.currentVerIndex + direction;
        if (newIndex < 0 || newIndex >= msg.versions.length) return;

        msg.currentVerIndex = newIndex;
        const version = msg.versions[newIndex];
        msg.content = version.content;
        msg.reasoning_content = version.reasoning_content;
        
        saveState();
        renderMessages();
    }

    // --- 发送消息与 API 调用 ---
    async function sendMessage() {
        if (isGenerating) return;
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text && !currentFile) return;
        if (!appState.apiKey) {
            showToast('请先在设置中配置 API Key', 'error');
            toggleSettings();
            return;
        }

        // 1. 构建用户消息
        let finalContent = text;
        if (currentFile) {
            finalContent += `\n\n[文件内容: ${currentFile.name}]\n\`\`\`\n${currentFile.content}\n\`\`\``;
            clearFile();
        }

        const userMsg = { role: 'user', content: finalContent };
        
        // 2. 添加到本地状态
        const sess = appState.sessions[appState.activeSessionId];
        sess.messages.push(userMsg);
        // 如果是第一条消息，更新标题
        if (sess.messages.length === 1) {
            sess.title = text.substring(0, 20) || '新对话';
            document.getElementById('chatTitle').innerText = sess.title;
            renderSessions();
        }
        saveState();
        renderMessages();
        input.value = '';
        input.style.height = 'auto';

        // 3. 准备 API 请求
        isGenerating = true;
        document.getElementById('sendBtn').disabled = true;
        
        // 添加一个临时的 AI 消息占位符
        const aiMsgIndex = sess.messages.length;
        const tempAiMsg = { 
            role: 'assistant', 
            content: '', 
            reasoning_content: '',
            versions: [] 
        };
        sess.messages.push(tempAiMsg);
        renderMessages(); // 渲染出空的气泡和打字机效果位置

        try {
            const history = sess.messages.slice(0, -1).map(m => ({
                role: m.role,
                content: m.content // 注意：实际发送历史时，通常不发送 reasoning_content，只发 content
            }));

            const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${appState.apiKey}`
                },
                body: JSON.stringify({
                    model: appState.model,
                    messages: history,
                    temperature: parseFloat(appState.temperature),
                    stream: true // 开启流式传输
                })
            });

            if (!response.ok) throw new Error(`API Error: ${response.status}`);

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            let fullContent = '';
            let fullReasoning = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop(); // 保留最后一行可能不完整的数据

                for (const line of lines) {
                    if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                        try {
                            const json = JSON.parse(line.slice(6));
                            const delta = json.choices.delta;
                            
                            if (delta.reasoning_content) {
                                fullReasoning += delta.reasoning_content;
                                tempAiMsg.reasoning_content = fullReasoning;
                            }
                            if (delta.content) {
                                fullContent += delta.content;
                                tempAiMsg.content = fullContent;
                            }
                            
                            // 实时渲染当前消息
                            renderSingleMessage(aiMsgIndex, tempAiMsg);
                            scrollToBottom();
                        } catch (e) { console.error(e); }
                    }
                }
            }

            // 完成后，将此消息加入版本历史
            tempAiMsg.versions.push({
                content: fullContent,
                reasoning_content: fullReasoning
            });
            tempAiMsg.currentVerIndex = 0;
            
        } catch (error) {
            showToast('请求失败: ' + error.message, 'error');
            sess.messages[aiMsgIndex].content = 'Error: ' + error.message;
            sess.messages[aiMsgIndex].isError = true;
        } finally {
            isGenerating = false;
            document.getElementById('sendBtn').disabled = false;
            saveState();
            renderMessages(); // 最终完整渲染
        }
    }

    // 局部渲染单个消息（用于流式输出优化性能）
    function renderSingleMessage(index, msg) {
        const container = document.getElementById('messagesContainer');
        const msgDiv = container.children[index];
        if (!msgDiv) return;

        // 更新内容
        const contentWrapper = msgDiv.querySelector('.message-content-wrapper');
        
        // 更新思考内容
        if (msg.reasoning_content) {
            let thinkBlock = contentWrapper.querySelector('.think-block');
            if (!thinkBlock) {
                thinkBlock = document.createElement('div');
                thinkBlock.className = 'think-block';
                thinkBlock.innerHTML = `
                    <div class="think-header" onclick="this.nextElementSibling.classList.toggle('expanded')">
                        <span><i class="fas fa-brain"></i> 深度思考过程</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="think-content expanded"></div>
                `;
                contentWrapper.insertBefore(thinkBlock, contentWrapper.firstChild);
            }
            thinkBlock.querySelector('.think-content').innerText = msg.reasoning_content;
        }

        // 更新主内容
        const bubble = contentWrapper.querySelector('.message-content');
        bubble.innerHTML = formatMarkdown(msg.content);
    }

    // --- 辅助功能 ---
    function formatMarkdown(text) {
        // 简单的 Markdown 解析，生产环境建议引入 marked.js
        if (!text) return '';
        let html = escapeHtml(text);
        // 代码块
        html = html.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
        // 行内代码
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
        // 换行
        html = html.replace(/\n/g, '<br>');
        return html;
    }

    function escapeHtml(text) {
        const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
        return text.replace(/[&<>"']/g, m => map[m]);
    }

    function handleFileUpload(e) {
        const file = e.target.files;
        if (!file) return;
        if (file.size > 50 * 1024 * 1024) {
            showToast('文件大小超过 50MB', 'error');
            return;
        }
        
        const reader = new FileReader();
        reader.onload = (event) => {
            currentFile = {
                name: file.name,
                content: event.target.result
            };
            document.getElementById('filePreviewBar').classList.add('active');
            document.getElementById('fileNameDisplay').innerText = file.name;
        };
        reader.readAsText(file);
        e.target.value = ''; // 重置 input
    }

    function clearFile() {
        currentFile = null;
        document.getElementById('filePreviewBar').classList.remove('active');
    }

    // --- 设置与 UI ---
    function toggleSettings() {
        document.getElementById('settingsPanel').classList.toggle('open');
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
    }

    function applySettingsToUI() {
        document.getElementById('apiKeyInput').value = appState.apiKey;
        document.getElementById('modelSelect').value = appState.model;
        document.getElementById('tempRange').value = appState.temperature;
        document.getElementById('tempVal').innerText = appState.temperature;
        document.getElementById('deepThinkCheck').checked = appState.deepThink;
        document.getElementById('bgColorPicker').value = appState.bgColor;
        document.getElementById('userAvatarInput').value = appState.userAvatar;
        document.getElementById('aiAvatarInput').value = appState.aiAvatar;
        
        document.body.style.backgroundColor = appState.bgColor;
    }

    // 监听设置变化
    document.getElementById('apiKeyInput').onchange = (e) => { appState.apiKey = e.target.value; saveState(); };
    document.getElementById('modelSelect').onchange = (e) => { appState.model = e.target.value; saveState(); };
    document.getElementById('tempRange').oninput = (e) => { 
        appState.temperature = e.target.value; 
        document.getElementById('tempVal').innerText = e.target.value;
        saveState(); 
    };
    document.getElementById('deepThinkCheck').onchange = (e) => { appState.deepThink = e.target.checked; saveState(); };
    document.getElementById('bgColorPicker').oninput = (e) => { 
        appState.bgColor = e.target.value; 
        document.body.style.backgroundColor = e.target.value;
        saveState(); 
    };
    document.getElementById('userAvatarInput').onchange = (e) => { appState.userAvatar = e.target.value; saveState(); renderMessages(); };
    document.getElementById('aiAvatarInput').onchange = (e) => { appState.aiAvatar = e.target.value; saveState(); renderMessages(); };

    function clearAllData() {
        if(confirm('确定清除所有数据？不可恢复！')) {
            indexedDB.deleteDatabase(DB_NAME);
            location.reload();
        }
    }

    function showToast(msg, type='info') {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.className = `toast show ${type}`;
        setTimeout(() => toast.classList.remove('show'), 3000);
    }
</script>
